<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colton Herta - 2026 F2 Season</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #242430;
    --accent: #e8ff00;
    --accent2: #ff4a1c;
    --text: #f0f0f0;
    --muted: #666672;
    --cadillac: #b8963e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── BACKGROUND TEXTURE ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(232,255,0,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 100% 100%, rgba(255,74,28,0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1300px; margin: 0 auto; padding: 0 24px; }

  /* ── HEADER BANNER ── */
  .top-bar {
    background: var(--cadillac);
    height: 3px;
    width: 100%;
  }

  .hero {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
  }

  .hero-inner {
    display: flex;
    align-items: flex-end;
    gap: 32px;
    flex-wrap: wrap;
  }

  .driver-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 8vw, 100px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: var(--text);
  }

  .driver-name span {
    display: block;
    color: var(--accent);
  }

  .driver-meta {
    padding-bottom: 8px;
  }

  .driver-meta p {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .driver-meta .team {
    font-size: 13px;
    color: var(--cadillac);
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* ── STATS HEADER ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin: 28px 0;
    border-radius: 4px;
    overflow: hidden;
  }

  .stat-card {
    background: var(--surface);
    padding: 28px 32px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 32px;
    width: 32px; height: 2px;
    background: var(--accent);
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    line-height: 1;
    color: var(--text);
  }

  .stat-card.crashes .stat-value { color: var(--accent2); }

  /* ── RACE SELECTOR ── */
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .flag-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 40px;
  }

  @media (max-width: 900px) { .flag-grid { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 500px) { .flag-grid { grid-template-columns: repeat(3, 1fr); } }

  .flag-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 8px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .flag-btn:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-2px);
  }

  .flag-btn.active {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .flag-btn.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  .flag-btn.has-data .flag-emoji::after {
    content: '●';
    position: absolute;
    top: 2px; right: 2px;
    font-size: 6px;
    color: var(--accent);
  }

  .flag-emoji {
    font-size: 26px;
    position: relative;
    line-height: 1;
  }

  .flag-round {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .flag-country {
    font-size: 10px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    line-height: 1.2;
    letter-spacing: 0.3px;
  }

  /* ── RACE PANEL ── */
  .race-panel {
    display: none;
    animation: fadeIn 0.25s ease;
  }

  .race-panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .race-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .race-flag-large { font-size: 40px; }

  .race-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
  }

  /* ── DATA SECTIONS ── */
  .data-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 16px;
  }

  @media (max-width: 800px) { .data-grid { grid-template-columns: 1fr; } }

  .data-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .data-section-head {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .data-section-head .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
  }

  .data-table th {
    padding: 8px 14px;
    text-align: left;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .data-table td {
    padding: 9px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    border-bottom: 1px solid rgba(36,36,48,0.5);
  }

  .data-table tr:last-child td { border-bottom: none; }

  .data-table td.lap-time { color: var(--accent); font-weight: 500; }
  .data-table td.pos-p1 { color: #ffd700; }
  .data-table td.pos-p2 { color: #c0c0c0; }
  .data-table td.pos-p3 { color: #cd7f32; }
  .data-table td.dnf { color: var(--accent2); }
  .data-table td.gap { color: var(--muted); font-size: 11px; }

  .empty-state {
    padding: 28px 16px;
    text-align: center;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .empty-state .icon { font-size: 20px; margin-bottom: 8px; }

  /* ── NO RACE SELECTED ── */
  .no-selection {
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
  }

  .no-selection .big { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--border); margin-bottom: 12px; }
  .no-selection p { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; }

  /* ── FOOTER ── */
  footer {
    margin-top: 80px;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: gap;
  }

  footer p {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .season-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: var(--cadillac);
    letter-spacing: 2px;
  }

  /* ── CIRCUIT MAP BUTTON ── */
  .map-btn {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .map-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,0,0.04);
  }

  .layout-btn {
    border-color: rgba(184,150,62,0.5);
    color: var(--cadillac);
  }

  .layout-btn:hover {
    border-color: var(--cadillac);
    color: var(--cadillac);
    background: rgba(184,150,62,0.06);
  }

  /* ── CIRCUIT LAYOUT IMAGE ── */
  .circuit-layout-img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 2px;
  }

  .circuit-layout-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 300px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .map-btn svg {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
  }

  /* ── CRASH BADGE — push right after map btn ── */
  .race-header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .race-crash-badge {
    background: rgba(255,74,28,0.15);
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 4px 12px;
    border-radius: 3px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    display: none;
  }

  .race-crash-badge.visible { display: block; }

  /* ── CIRCUIT MAP MODAL ── */
  .map-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: overlayIn 0.2s ease;
    backdrop-filter: blur(4px);
  }

  @keyframes overlayIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .map-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    width: 100%;
    max-width: 900px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    animation: modalIn 0.25s ease;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(12px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .map-modal-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
  }

  .map-modal-header .flag { font-size: 22px; }

  .map-modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
  }

  .map-modal-subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    margin-top: 3px;
  }

  .map-modal-close {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 30px;
    height: 30px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    flex-shrink: 0;
  }

  .map-modal-close:hover {
    border-color: var(--accent2);
    color: var(--accent2);
  }

  .map-modal-body {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }

  .circuit-svg-wrap {
    width: 100%;
    height: 460px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0d14;
    padding: 24px;
    box-sizing: border-box;
  }

  .circuit-svg-wrap svg {
    max-width: 100%;
    max-height: 100%;
    filter: drop-shadow(0 0 18px rgba(232,255,0,0.08));
  }

  .map-modal-footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    flex-shrink: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* ── RACE LOCATION LINE ── */
  .race-location {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1.5px;
    margin-top: 1px;
    opacity: 0.85;
  }

  .race-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }
</style>
</head>

// ═══════════════════════════════════════
//  COMPUTED TOTALS — auto-calculated

function computeTotals() {
  let totalLaps = 0, totalRaces = 0, totalCrashes = 0;
  races.forEach(r => {
    const pracLaps = r.practice.reduce((sum, p) => sum + (p.laps || 0), 0);
    const qualLaps = r.qualifying.reduce((sum, q) => sum + (q.laps || 0), 0);
    const sprintLaps = r.sprint.length > 0 ? (r.sprint[0].laps || 0) : 0;
    const featureLaps = r.feature.length > 0 ? (r.feature[0].laps || 0) : 0;
    totalLaps += sprintLaps + featureLaps + pracLaps + qualLaps;
    if (r.sprint.length > 0) totalRaces++;
    if (r.feature.length > 0) totalRaces++;
    if (r.crashed) totalCrashes++;
  });
  document.getElementById('total-laps').textContent = totalLaps;
  document.getElementById('total-races').textContent = totalRaces;
  document.getElementById('total-crashes').textContent = totalCrashes;
}

// ═══════════════════════════════════════
//  RENDER FLAG GRID
// ═══════════════════════════════════════
function buildFlagGrid() {
  const grid = document.getElementById('flag-grid');
  races.forEach((r, i) => {
    const hasData = r.practice.length > 0 || r.qualifying.length > 0 ||
                    r.sprint.length > 0 || r.feature.length > 0;
    const btn = document.createElement('button');
    btn.className = 'flag-btn' + (hasData ? ' has-data' : '');
    btn.setAttribute('data-index', i);
    btn.innerHTML = `
      <span class="flag-round">R${r.round}</span>
      <span class="flag-emoji">${r.flag}</span>
      <span class="flag-country">${r.country}</span>
    `;
    btn.addEventListener('click', () => selectRace(i));
    grid.appendChild(btn);
  });
}

// ═══════════════════════════════════════
//  RENDER RACE PANEL
// ═══════════════════════════════════════
let activeIndex = null;

function posClass(pos) {
  if (pos == 1) return 'pos-p1';
  if (pos == 2) return 'pos-p2';
  if (pos == 3) return 'pos-p3';
  return '';
}

function renderTable(head, headers, rows, emptyMsg) {
  let html = `<div class="data-section">
    <div class="data-section-head"><span class="dot"></span>${head}</div>`;
  if (rows.length === 0) {
    html += `<div class="empty-state"><div class="icon">—</div>${emptyMsg}</div>`;
  } else {
    html += `<table class="data-table"><thead><tr>`;
    headers.forEach(h => html += `<th>${h}</th>`);
    html += `</tr></thead><tbody>`;
    rows.forEach(row => {
      html += `<tr>`;
      row.forEach((cell, ci) => {
        const cls = cell.cls || '';
        html += `<td class="${cls}">${cell.val !== undefined ? cell.val : cell}</td>`;
      });
      html += `</tr>`;
    });
    html += `</tbody></table>`;
  }
  html += `</div>`;
  return html;
}

function selectRace(index) {
  if (activeIndex !== null) {
    document.querySelector(`.flag-btn[data-index="${activeIndex}"]`).classList.remove('active');
  }
  activeIndex = index;
  document.querySelector(`.flag-btn[data-index="${index}"]`).classList.add('active');

  const r = races[index];
  const display = document.getElementById('race-display');

  // Practice table
  const pracRows = r.practice.map(p => [
    {val: `P${p.pos}`, cls: posClass(p.pos)},
    {val: p.laps, cls: 'laps'},
    {val: p.time, cls: 'lap-time'},
    {val: p.gap || '—', cls: 'gap'},
    {val: p.crashes, cls: 'crashes'}
  ]);

  // Qualifying table
  const qualRows = r.qualifying.map(q => [
    {val: `P${q.pos}`, cls: posClass(q.pos)},
    {val: q.laps, cls: 'laps'},
    {val: q.time, cls: 'lap-time'},
    {val: q.gap || '—', cls: 'gap'},
    {val: q.crashes, cls: 'crashes'}
  ]);

  // Sprint table
  const sprintRows = r.sprint.map(s => [
    {val: s.pos === 'DNF' ? 'DNF' : `P${s.pos}`, cls: s.pos === 'DNF' ? 'dnf' : posClass(s.pos)},
    {val: s.laps || '—', cls: 'laps'},
    {val: s.time, cls: 'lap-time'},
    {val: s.gap || '—', cls: 'gap'},
    {val: s.bestLap ? `${s.bestLap}` : '—', cls: 'gap'},
    {val: s.crashes, cls: 'crashes'}
  ]);

  // Feature table
  const featRows = r.feature.map(f => [
    {val: f.pos === 'DNF' ? 'DNF' : `P${f.pos}`, cls: f.pos === 'DNF' ? 'dnf' : posClass(f.pos)},
    {val: f.laps || '—', cls: 'laps'},
    {val: f.time, cls: 'lap-time'},
    {val: f.gap || '—', cls: 'gap'},
    {val: f.bestLap ? `${f.bestLap}` : '—', cls: 'gap'},
    {val: f.crashes, cls: 'crashes'}
  ]);

  display.innerHTML = `
    <div class="race-panel active">
      <div class="race-header">
        <span class="race-flag-large">${r.flag}</span>
        <div>
          <div class="race-title">${r.name}</div>
          <div class="race-date">${r.circuit} · ${r.location || ''} · ${r.date}</div>
        </div>
        <div class="race-header-right">
          <div class="race-crash-badge ${r.crashed ? 'visible' : ''}">⚠ CRASH</div>
          <button class="map-btn" onclick="openLocationModal(${index})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7l6-3 6 3 6-3v13l-6 3-6-3-6 3V7z"/>
              <line x1="9" y1="4" x2="9" y2="17"/>
              <line x1="15" y1="7" x2="15" y2="20"/>
            </svg>
            Map
          </button>
          <button class="map-btn layout-btn" onclick="openLayoutModal(${index})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="12" rx="10" ry="5" transform="rotate(-20 12 12)"/>
              <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
            </svg>
            Track
          </button>
        </div>
      </div>

      <div class="data-grid" style="grid-template-columns: 1fr 1fr;">
        ${renderTable('Free Practice', ['Pos', 'Laps', 'Time', 'Gap', 'Crashes'], pracRows, 'No practice data yet')}
        ${renderTable('Qualifying', ['Pos', 'Laps', 'Time', 'Gap', 'Crashes'], qualRows, 'No qualifying data yet')}
        ${renderTable('Sprint Race', ['Pos', 'Laps', 'Time', 'Gap', 'Best Lap', 'Crashes'], sprintRows, 'No sprint data yet')}    
        ${renderTable('Feature Race', ['Pos', 'Laps', 'Time', 'Gap', 'Best Lap', 'Crashes'], featRows, 'No feature race data yet')}
      </div>
    </div>
  `;
}

function _buildModalShell(r, bodyHTML, footerHTML) {
  const overlay = document.createElement('div');
  overlay.className = 'map-modal-overlay';
  overlay.id = 'map-modal-overlay';
  overlay.innerHTML = `
    <div class="map-modal">
      <div class="map-modal-header">
        <span class="flag">${r.flag}</span>
        <div>
          <div class="map-modal-title">${r.name}</div>
          <div class="map-modal-subtitle">${r.circuit} · ${r.location || ''}</div>
        </div>
        <button class="map-modal-close" onclick="closeMapModal()">✕</button>
      </div>
      <div class="map-modal-body">${bodyHTML}</div>
      <div class="map-modal-footer">${footerHTML}</div>
    </div>
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeMapModal(); });
  document.body.appendChild(overlay);
  document.body.style.overflow = 'hidden';
}

function openLocationModal(index) {
  const r = races[index];
  const coords = circuitCoords[r.name] || { lat: 0, lon: 0 };
  const delta = 0.012;
  const bbox = `${(coords.lon - delta*2).toFixed(6)},${(coords.lat - delta).toFixed(6)},${(coords.lon + delta*2).toFixed(6)},${(coords.lat + delta).toFixed(6)}`;
  const mapUrl = `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${coords.lat},${coords.lon}`;
  const bodyHTML = `<iframe src="${mapUrl}" loading="lazy" title="Location of ${r.circuit}" style="width:100%;height:460px;border:none;display:block;"></iframe>`;
  const footerHTML = `<span></span>`;
  _buildModalShell(r, bodyHTML, footerHTML);
}

function openLayoutModal(index) {
  const r = races[index];
  const imgUrl = circuitLayoutImages[r.name];
  const circuit = circuitSVGs[r.name];
  const lapInfo = circuit ? `${circuit.laps} laps · ${circuit.length}` : '';
  const bodyHTML = imgUrl
    ? `<div style="background:#0a0a10;line-height:0;">
        <img src="${imgUrl}" alt="Circuit layout for ${r.name}" class="circuit-layout-img"
          onerror="this.parentNode.innerHTML='<div class=circuit-layout-loading>Image unavailable</div>'"/>
       </div>`
    : `<div class="circuit-layout-loading">No layout image available</div>`;
  const footerHTML = `<span>Official F2 circuit layout</span>`;
  _buildModalShell(r, bodyHTML, footerHTML);
}

function closeMapModal() {
  const overlay = document.getElementById('map-modal-overlay');
  if (overlay) overlay.remove();
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMapModal(); });
