    const colorScale = d3.scaleOrdinal()
        .domain(carKeys)
        .range(combinedPalette.slice(0, carKeys.length));

    // Dash Scale
    // Even with distinct colors, some can still look similar at a glance
    // (e.g. under color-vision deficiency, or on a small screen). To make
    // every other line unmistakably distinct, alternate lines are dashed.
    const dashPatterns = ["", "6,4"]; // solid, dashed
    const dashScale = d3.scaleOrdinal()
        .domain(carKeys)
        .range(carKeys.map((_, i) => dashPatterns[i % 2]));

    // Line Generator
    const lineGenerator = d3.line()
        .x(d => xScale(d.lap))
        .y(d => yScale(d.time))
        .curve(d3.curveMonotoneX);

    // --- Dynamic tick generation ---
    // Rather than a fixed tick list, we compute a "nice" step (1, 2, 5, 10...)
    // for whatever domain is currently visible, then round to a minimum
    // granularity so ticks never look duplicated or over-precise:
    //   x-axis (laps): never finer than whole laps (minStep = 1)
    //   y-axis (lap time): never finer than tenths of a second (minStep = 0.1)
    function computeNiceStep(d0, d1, targetCount, minStep) {
        let step = d3.tickStep(d0, d1, targetCount);
        if (minStep !== undefined && step < minStep) step = minStep;
        return step;
    }

    function computeTickValues(d0, d1, step) {
        const start = Math.ceil(d0 / step) * step;
        const epsilon = step / 1e6;
        const values = [];
        for (let v = start; v <= d1 + epsilon; v += step) {
            values.push(Math.round(v / step) * step); // snap off floating-point drift
        }
        return values;
    }

    function decimalsForStep(step) {
        if (step >= 1) return 0;
        const s = step.toFixed(10).replace(/0+$/, "");
        const idx = s.indexOf(".");
        return idx === -1 ? 0 : s.length - idx - 1;
    }

    // Clip path so zoomed/panned content never spills outside the plot area
    svg.append("defs").append("clipPath")
        .attr("id", "plot-clip")
        .append("rect")
        .attr("width", width)
        .attr("height", height);

    const gridGroup = svg.append("g").attr("class", "grid");

    const xAxisGroup = svg.append("g")
        .attr("class", "x-axis-group")
        .attr("transform", `translate(0,${height})`);

    const yAxisGroup = svg.append("g")
        .attr("class", "y-axis-group");

    // Draws/updates the axes and gridlines for whatever x/y scales are
    // currently in effect (called once for the initial view, then again on
    // every zoom/pan event with the rescaled scales).
    function renderAxes(currentX, currentY) {
        const [x0, x1] = currentX.domain();
        const [y0, y1] = currentY.domain();

        const xStep = computeNiceStep(x0, x1, 12, 1);
        const xTicks = computeTickValues(x0, x1, xStep);

        const yStep = computeNiceStep(y0, y1, 6, 0.1);
        const yTicks = computeTickValues(y0, y1, yStep);
        const yDecimals = decimalsForStep(yStep);

        xAxisGroup.call(
            d3.axisBottom(currentX).tickValues(xTicks).tickFormat(d3.format("d"))
        );
        yAxisGroup.call(
            d3.axisLeft(currentY).tickValues(yTicks).tickFormat(d3.format(`.${yDecimals}f`))
        );
        gridGroup.call(
            d3.axisLeft(currentY).tickValues(yTicks).tickSize(-width).tickFormat("")
        );
    }

    // Initial (un-zoomed) render
    renderAxes(xScale, yScale);

    // Labels
    svg.append("text")
        .attr("class", "axis-label")
        .attr("text-anchor", "middle")
        .attr("x", width / 2)
        .attr("y", height + 40)
        .text("Lap");

    svg.append("text")
        .attr("class", "axis-label")
        .attr("text-anchor", "middle")
        .attr("transform", "rotate(-90)")
        .attr("x", -height / 2)
        .attr("y", -45)
        .text("Lap Time (s)");
    
    // Group that holds the lines, clipped to the plot area so zooming/panning
    // never draws outside the axes
    const plotArea = svg.append("g")
        .attr("clip-path", "url(#plot-clip)");

    // Draw Multiple Lines
    const linePaths = plotArea.selectAll(".line-path")
        .data(Array.from(sumData.entries()))
        .enter()
        .append("path")
        .attr("class", d => `line car-line car-line-${d[0]}`)
        .attr("d", d => lineGenerator(d[1])) 
        .attr("stroke", d => colorScale(d[0]))
        .attr("stroke-dasharray", d => dashScale(d[0]));
/*
    // Add Interactive Data Points for all cars
    svg.selectAll(".dot")
        .data(data)
        .enter()
        .append("circle")
        .attr("class", "dot")
        .attr("cx", d => xScale(d.lap))
        .attr("cy", d => yScale(d.time))
        .attr("r", 4.5)
        .attr("fill", d => colorScale(d.car))
        .append("title")
            .text(d => `Car ${d.car}\nLap ${d.lap}: ${d.time.toFixed(4)}s`); */

    // Add the Legend
    const legend = svg.append("g")
        .attr("transform", `translate(${width + 20}, 10)`);

    // --- Show All / Hide All toggle button ---
    const toggleButton = legend.append("g")
        .attr("class", "legend-toggle-all")
        .attr("transform", "translate(0, 0)")
        .style("cursor", "pointer");

    const toggleButtonRect = toggleButton.append("rect")
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", 96)
        .attr("height", 24)
        .attr("rx", 4)
        .attr("fill", "#f3f4f6")
        .attr("stroke", "#d1d5db");

    const toggleButtonText = toggleButton.append("text")
        .attr("x", 48)
        .attr("y", 16)
        .attr("text-anchor", "middle")
        .attr("class", "legend-text")
        .style("font-weight", "600")
        .text("Hide All");

    // --- Compare Laps button ---
    // Toggles a click-and-drag lap-range selector: while active, dragging on
    // the chart draws a box instead of panning, and releasing it compares
    // whichever drivers are currently visible over that lap range.
    const compareButton = legend.append("g")
        .attr("class", "legend-compare-laps")
        .attr("transform", "translate(104, 0)")
        .style("cursor", "pointer");

    const compareButtonRect = compareButton.append("rect")
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", 96)
        .attr("height", 24)
        .attr("rx", 4)
        .attr("fill", "#f3f4f6")
        .attr("stroke", "#d1d5db");

    const compareButtonText = compareButton.append("text")
        .attr("x", 48)
        .attr("y", 16)
        .attr("text-anchor", "middle")
        .attr("class", "legend-text")
        .style("font-weight", "600")
        .text("Compare Laps");

    compareButton.append("title")
        .text("Click to toggle lap-range comparison mode, then drag a box across the laps you want to compare");

    // Vertical offset for the per-driver rows, to leave room for the button
    const legendRowsTop = 36;

    const legendRows = legend.append("g")
        .attr("transform", `translate(0, ${legendRowsTop})`);

    // Row sizing: wide enough for the longest driver name plus a color swatch
    const legendRowWidth = 226;
    const legendRowHeight = 22;

    carKeys.forEach((carNumber, index) => {
        const legendRow = legendRows.append("g")
            .attr("class", "legend-row")
            .attr("data-car", carNumber)
            .attr("transform", `translate(0, ${index * 26})`)
            .on("click", function () {
                const row = d3.select(this);
                const isHidden = row.classed("hidden");
                row.classed("hidden", !isHidden);

                svg.select(`.car-line-${carNumber}`)
                    .style("display", isHidden ? null : "none");

                updateToggleButtonLabel();
            });

        // Border so each row clearly reads as a clickable button
        legendRow.append("rect")
            .attr("class", "legend-btn-bg")
            .attr("x", -8)
            .attr("y", -6)
            .attr("width", legendRowWidth)
            .attr("height", legendRowHeight)
            .attr("rx", 4);

        legendRow.append("line")
            .attr("class", "legend-swatch")
            .attr("x1", 0)
            .attr("x2", 16)
            .attr("y1", 6)
            .attr("y2", 6)
            .attr("stroke", colorScale(carNumber))
            .attr("stroke-width", 3)
            .attr("stroke-dasharray", dashScale(carNumber));

        legendRow.append("text")
            .attr("class", "legend-text")
            .attr("x", 24)
            .attr("y", 10)
            .text(`Car ${carNumber} - ${driverNames[carNumber] || "Unknown"}`);

        // Custom color picker: lets the user pick any color for this line.
        // Sits inside a foreignObject so we can embed a native <input
        // type="color">. Clicks on it stop propagation so opening the color
        // picker doesn't also toggle the line's visibility.
        const colorPicker = legendRow.append("foreignObject")
            .attr("x", legendRowWidth - 34)
            .attr("y", -3)
            .attr("width", 20)
            .attr("height", 16)
            .on("click", (event) => event.stopPropagation())
            .on("mousedown", (event) => event.stopPropagation());

        colorPicker.append(() => document.createElement("input"))
            .attr("type", "color")
            .attr("class", "legend-color-input")
            .attr("value", colorScale(carNumber))
            .attr("title", `Choose a custom color for Car ${carNumber} - ${driverNames[carNumber] || "Unknown"}`)
            .on("input", function () {
                const newColor = this.value;
                svg.select(`.car-line-${carNumber}`).attr("stroke", newColor);
                legendRow.select(".legend-swatch").attr("stroke", newColor);
                updateBoxPlotColor(carNumber, newColor);
            });
    });

    // Keep the button label in sync with the current show/hide state:
    // "Hide All" when at least one line is still visible, "Show All" once
    // every line has been hidden.
    function updateToggleButtonLabel() {
        const allHidden = legendRows.selectAll(".legend-row").size() ===
            legendRows.selectAll(".legend-row.hidden").size();
        toggleButtonText.text(allHidden ? "Show All" : "Hide All");
    }

    toggleButton.on("click", function () {
        const shouldHide = toggleButtonText.text() === "Hide All";

        legendRows.selectAll(".legend-row")
            .classed("hidden", shouldHide)
            .each(function (d) {
                const carNumber = d3.select(this).attr("data-car");
                svg.select(`.car-line-${carNumber}`)
                    .style("display", shouldHide ? "none" : null);
            });

        toggleButtonText.text(shouldHide ? "Show All" : "Hide All");
    });

    // --- Zoom / Pan interactivity ---
    // Scroll or pinch to zoom, drag to pan, double-click (or the Reset Zoom
    // button) to return to the original view. Mirrors the interaction model
    // from https://observablehq.com/@d3/zoomable-bar-chart, adapted for a
    // multi-line chart: on every zoom event we rescale both axes and redraw
    // the lines against the rescaled x/y scales rather than swapping bar
    // widths.
    //
    // Two things kept this smooth even when fully zoomed in and dragging:
    //  1. Panning fires many more "zoom" events than the screen can actually
    //     repaint, so raw work is batched into at most one redraw per
    //     animation frame instead of once per event.
    //  2. Every car's full ~90-point lap history was being run through the
    //     line generator on every redraw, even though only a handful of laps
    //     are visible when zoomed all the way in. Each car's points are now
    //     sliced down to the visible lap range (plus a small buffer) with a
    //     binary search before being handed to the line generator.
    const bisectLap = d3.bisector(d => d.lap).left;

    function getVisibleSlice(points, lapMin, lapMax) {
        const buffer = 2; // keep a couple laps on either side for smooth edges
        let i0 = bisectLap(points, lapMin - buffer);
        let i1 = bisectLap(points, lapMax + buffer);
        i0 = Math.max(0, i0 - 1);
        i1 = Math.min(points.length, i1 + 1);
        return points.slice(i0, i1);
    }

    // Track whatever x/y scales are currently in effect (identity by
    // default, rescaled while zoomed) so lap-range math for Compare Laps
    // stays correct no matter the current zoom/pan position.
    let currentXScale = xScale;
    let currentYScale = yScale;

    function draw(transform) {
        const newX = transform.rescaleX(xScale);
        const newY = transform.rescaleY(yScale);
        currentXScale = newX;
        currentYScale = newY;

        renderAxes(newX, newY);

        const [lapMin, lapMax] = newX.domain();
        const zoomedLineGenerator = d3.line()
            .x(d => newX(d.lap))
            .y(d => newY(d.time))
            .curve(d3.curveMonotoneX);

        plotArea.selectAll(".car-line")
            .filter(function () { return this.style.display !== "none"; })
            .attr("d", d => zoomedLineGenerator(getVisibleSlice(d[1], lapMin, lapMax)));
    }

    let pendingTransform = null;
    let rafHandle = null;

    function scheduleDraw(transform) {
        pendingTransform = transform;
        if (rafHandle !== null) return;
        rafHandle = requestAnimationFrame(() => {
            rafHandle = null;
            draw(pendingTransform);
        });
    }

    const zoom = d3.zoom()
        .scaleExtent([1, 25])
        .translateExtent([[0, 0], [width, height]])
        .extent([[0, 0], [width, height]])
        .on("zoom", event => scheduleDraw(event.transform));

    // Transparent overlay that captures scroll/drag gestures over the plot
    // area. Sits on top of the lines but doesn't extend over the legend.
    const zoomOverlay = svg.append("rect")
        .attr("class", "zoom-overlay")
        .attr("width", width)
        .attr("height", height)
        .style("fill", "none")
        .style("pointer-events", "all");

    function resetZoom() {
        zoomOverlay.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
    }

    // Named hint text so Compare Laps mode can swap its wording in and out
    const hintText = svg.append("text")
        .attr("class", "axis-label")
        .attr("x", -20)
        .attr("y", -20)
        .style("fill", "#6b7280")
        .style("font-style", "italic")
        .text("Scroll/pinch to zoom, drag to pan, double-click to reset");

    // The in-progress/last-drawn selection box
    const selectionRect = svg.append("rect")
        .attr("class", "compare-selection")
        .attr("fill", "#3b82f6")
        .attr("fill-opacity", 0.12)
        .attr("stroke", "#3b82f6")
        .attr("stroke-width", 1.5)
        .attr("stroke-dasharray", "4,3")
        .style("display", "none")
        .style("pointer-events", "none");

    // Result readout, shown once a selection is released
    const compareResultText = svg.append("text")
        .attr("class", "axis-label")
        .attr("x", -20)
        .attr("y", -20)
        .style("fill", "#1d4ed8")
        .style("font-weight", "600")
        .style("display", "none");

    function showCompareMessage(text) {
        hintText.style("display", "none");
        compareResultText.style("display", null).text(text);
    }

    function getVisibleCarKeys() {
        return legendRows.selectAll(".legend-row:not(.hidden)").nodes()
            .map(node => +node.getAttribute("data-car"));
    }

    // Figures out, lap by lap across every currently-visible driver, who
    // posted the faster time, then reports what share of the selected laps
    // each driver won.
    function runComparison(lapMin, lapMax) {
        const visibleCars = getVisibleCarKeys();

        if (visibleCars.length < 2) {
            showCompareMessage("Show at least two drivers (use the legend) to compare them.");
            return;
        }
        if (!Number.isFinite(lapMin) || !Number.isFinite(lapMax) || lapMax <= lapMin) {
            showCompareMessage("Drag out a wider box to select a lap range.");
            return;
        }

        const wins = new Map(visibleCars.map(c => [c, 0]));
        let comparedLaps = 0;

        for (let lap = lapMin; lap <= lapMax; lap++) {
            const timesThisLap = [];
            visibleCars.forEach(carNumber => {
                const point = (sumData.get(carNumber) || []).find(d => d.lap === lap);
                if (point) timesThisLap.push({ car: carNumber, time: point.time });
            });
            if (timesThisLap.length >= 2) {
                comparedLaps++;
                let fastest = timesThisLap[0];
                timesThisLap.forEach(t => { if (t.time < fastest.time) fastest = t; });
                wins.set(fastest.car, wins.get(fastest.car) + 1);
            }
        }

        if (comparedLaps === 0) {
            showCompareMessage(`No overlapping laps with data for laps ${lapMin}-${lapMax}.`);
            return;
        }

        const ranked = Array.from(wins.entries())
            .map(([car, count]) => ({
                car,
                name: driverNames[car] || `Car ${car}`,
                pct: (count / comparedLaps) * 100
            }))
            .sort((a, b) => b.pct - a.pct);

        const MAX_SHOWN = 3;
        const shown = ranked.length > MAX_SHOWN ? ranked.slice(0, MAX_SHOWN) : ranked;
        const truncated = ranked.length > MAX_SHOWN;

        const message = ranked.length === 2
            ? `${ranked[0].name} - faster across ${ranked[0].pct.toFixed(0)}% of selected laps ` +
              `(laps ${lapMin}-${lapMax}, ${comparedLaps} compared)`
            : `Laps ${lapMin}-${lapMax} (${comparedLaps} compared): ` +
              shown.map(r => `${r.name} fastest on ${r.pct.toFixed(0)}%`).join(" \u00b7 ") +
              (truncated ? ` \u00b7 (top ${MAX_SHOWN} of ${ranked.length} drivers shown)` : "");

        showCompareMessage(message);
    }

    // Fully swaps the overlay's event listeners between normal zoom/pan and
    // Compare Laps drag-to-select, rather than trying to run both at once.
    function attachZoomBehavior() {
        zoomOverlay
            .style("cursor", null)
            .call(zoom)
            .on("dblclick.zoom", null)
            .on("dblclick", () => resetZoom());
    }

    function detachZoomBehavior() {
        zoomOverlay.on(".zoom", null).on("dblclick", null);
    }

    function attachCompareBehavior() {
        let startPt = null;

        zoomOverlay
            .style("cursor", "crosshair")
            .on("mousedown.compare", function (event) {
                const [x0, y0] = d3.pointer(event, plotArea.node());
                startPt = [
                    Math.max(0, Math.min(width, x0)),
                    Math.max(0, Math.min(height, y0))
                ];
                selectionRect
                    .attr("x", startPt[0]).attr("y", startPt[1])
                    .attr("width", 0).attr("height", 0)
                    .style("display", null);
                compareResultText.style("display", "none");
                hintText.style("display", null)
                    .text("Drag a box over the lap range you want to compare\u2026");
            })
            .on("mousemove.compare", function (event) {
                if (!startPt) return;
                const [x1, y1] = d3.pointer(event, plotArea.node());
                const cx1 = Math.max(0, Math.min(width, x1));
                const cy1 = Math.max(0, Math.min(height, y1));
                selectionRect
                    .attr("x", Math.min(startPt[0], cx1))
                    .attr("y", Math.min(startPt[1], cy1))
                    .attr("width", Math.abs(cx1 - startPt[0]))
                    .attr("height", Math.abs(cy1 - startPt[1]));
            })
            .on("mouseup.compare", function (event) {
                if (!startPt) return;
                const [x1] = d3.pointer(event, plotArea.node());
                const cx1 = Math.max(0, Math.min(width, x1));
                const rawLapA = currentXScale.invert(startPt[0]);
                const rawLapB = currentXScale.invert(cx1);
                startPt = null;

                const lapMin = Math.round(Math.min(rawLapA, rawLapB));
                const lapMax = Math.round(Math.max(rawLapA, rawLapB));
                runComparison(lapMin, lapMax);
            });
    }

    function detachCompareBehavior() {
        zoomOverlay
            .style("cursor", null)
            .on("mousedown.compare", null)
            .on("mousemove.compare", null)
            .on("mouseup.compare", null);
        selectionRect.style("display", "none");
    }

    let compareMode = false;

    function setCompareMode(on) {
        compareMode = on;
        compareResultText.style("display", "none");
        selectionRect.style("display", "none");

        if (on) {
            detachZoomBehavior();
            attachCompareBehavior();
            compareButtonRect.attr("fill", "#dbeafe").attr("stroke", "#60a5fa");
            compareButtonText.text("Exit Compare");
            hintText.style("display", null)
                .text("Drag a box over the lap range you want to compare\u2026");
        } else {
            detachCompareBehavior();
            attachZoomBehavior();
            compareButtonRect.attr("fill", "#f3f4f6").attr("stroke", "#d1d5db");
            compareButtonText.text("Compare Laps");
            hintText.style("display", null)
                .text("Scroll/pinch to zoom, drag to pan, double-click to reset");
        }
    }

    compareButton.on("click", () => setCompareMode(!compareMode));

    // Start in normal zoom/pan mode
    attachZoomBehavior();

    // ================= Box & Whisker Plot: Lap Time Distribution =================
    // Uses the same (pit-stop-filtered) per-car lap data as the line chart
    // above. For each driver:
    //   - box spans Q1-Q3, with a solid line at the median and a dashed
    //     line at the mean
    //   - whiskers are NOT the usual 1.5*IQR convention; instead they're
    //     set from the car's own mean/std so that they bound the middle
    //     99% of a normal distribution fitted to that car's lap times
    //     (mean +/- 2.576 sigma), clipped to the most extreme lap that's
    //     still inside that range
    //   - any lap outside that 99% range is drawn as an individual dot
    //   - drivers are sorted left-to-right by ascending mean lap time
    const boxContainer = d3.select("#boxplot-chart");
    boxContainer.selectAll("*").remove();

    const boxMargin = { top: 30, right: 265, bottom: 90, left: 60 };
    const boxWidth = 1600 - boxMargin.left - boxMargin.right;
    const boxHeight = 800;

    // Keeps a driver's box-plot colors (box, whiskers, caps, median/mean
    // lines, outlier dots) in sync whenever their line color is changed via
    // the legend's color picker. Safe to call before the box plot has been
    // built (e.g. no-op) since it just no-ops on an empty selection.
    function updateBoxPlotColor(carNumber, newColor) {
        const carBoxGroup = d3.select(`.car-box-${carNumber}`);
        if (carBoxGroup.empty()) return;
        carBoxGroup.selectAll(".whisker, .cap, .median-line, .mean-line").attr("stroke", newColor);
        carBoxGroup.select(".box-rect").attr("fill", newColor).attr("stroke", newColor);
        carBoxGroup.selectAll(".outlier-dot").attr("fill", newColor);
    }

    // Compact "Surname (R)" label for the box plot's x-axis, where the full
    // "Car N - Full Name" legend label would be too wide for 25+ categories.
    function shortDriverLabel(carNumber) {
        const full = driverNames[carNumber] || `Car ${carNumber}`;
        const isRookie = / \(R\)$/.test(full);
        const base = full.replace(/ \(R\)$/, "");
        const parts = base.split(" ");
        const surname = parts[parts.length - 1];
        return isRookie ? `${surname} (R)` : surname;
    }

    // Two-tailed z-score such that +/- Z_99 sigma around the mean covers
    // 99% of a normal distribution's probability mass.
    const Z_99 = 2.5758293035489004;

    function computeBoxStats(values) {
        const sorted = values.slice().sort(d3.ascending);
        const n = sorted.length;
        const mean = d3.mean(sorted);
        const std = n > 1 ? d3.deviation(sorted) : 0;
        const median = d3.median(sorted);
        const q1 = d3.quantile(sorted, 0.25);
        const q3 = d3.quantile(sorted, 0.75);

        const lowerFence = mean - Z_99 * std;
        const upperFence = mean + Z_99 * std;

        const within = sorted.filter(v => v >= lowerFence && v <= upperFence);
        const whiskerLow = within.length ? within[0] : sorted[0];
        const whiskerHigh = within.length ? within[within.length - 1] : sorted[n - 1];
        const outliers = sorted.filter(v => v < lowerFence || v > upperFence);

        return { mean, median, q1, q3, whiskerLow, whiskerHigh, outliers, n };
    }

    const boxStatsByCar = new Map();
    carKeys.forEach(carNumber => {
        const values = (sumData.get(carNumber) || []).map(d => d.time);
        if (values.length > 0) {
            boxStatsByCar.set(carNumber, computeBoxStats(values));
        }
    });

    if (boxStatsByCar.size === 0) {
        boxContainer.append("p")
            .style("font-family", "sans-serif")
            .style("color", "#6b7280")
            .style("padding", "20px")
            .text("Not enough data to build a box plot for this race.");
    } else {
        const boxCarKeys = carKeys
            .filter(c => boxStatsByCar.has(c))
            .sort((a, b) => boxStatsByCar.get(a).mean - boxStatsByCar.get(b).mean);

        const boxSvg = boxContainer
            .append("svg")
                .attr("width", boxWidth + boxMargin.left + boxMargin.right)
                .attr("height", boxHeight + boxMargin.top + boxMargin.bottom)
            .append("g")
                .attr("transform", `translate(${boxMargin.left},${boxMargin.top})`);

        const xBand = d3.scaleBand()
            .domain(boxCarKeys)
            .range([0, boxWidth])
            .padding(0.4);

        // Y domain must fit every whisker end and every outlier
        let yMin = Infinity;
        let yMax = -Infinity;
        boxStatsByCar.forEach(stats => {
            yMin = Math.min(yMin, stats.whiskerLow, d3.min(stats.outliers) ?? Infinity);
            yMax = Math.max(yMax, stats.whiskerHigh, d3.max(stats.outliers) ?? -Infinity);
        });
        const yBoxPad = (yMax - yMin) * 0.08 || 1;
        const yBox = d3.scaleLinear()
            .domain([yMin - yBoxPad, yMax + yBoxPad])
            .nice()
            .range([boxHeight, 0]);

        // Clip path so the rotated driver-name ticks below the axis never
        // spill into the surrounding margin.
        boxSvg.append("defs").append("clipPath")
            .attr("id", "box-xaxis-clip")
            .append("rect")
            .attr("x", 0)
            .attr("y", -6)
            .attr("width", boxWidth)
            .attr("height", 100);

        // Gridlines
        boxSvg.append("g")
            .attr("class", "grid")
            .call(d3.axisLeft(yBox).ticks(8).tickSize(-boxWidth).tickFormat(""));

        // X axis: one tick per driver, rotated so labels don't collide
        boxSvg.append("g")
            .attr("class", "box-x-axis-group")
            .attr("clip-path", "url(#box-xaxis-clip)")
            .attr("transform", `translate(0,${boxHeight})`)
            .call(d3.axisBottom(xBand).tickFormat(shortDriverLabel))
            .selectAll("text")
                .attr("class", "axis-label")
                .attr("transform", "rotate(-40)")
                .style("text-anchor", "end")
                .attr("dx", "-0.6em")
                .attr("dy", "0.15em");

        boxSvg.append("g")
            .call(d3.axisLeft(yBox).ticks(8));

        boxSvg.append("text")
            .attr("class", "axis-label")
            .attr("text-anchor", "middle")
            .attr("transform", "rotate(-90)")
            .attr("x", -boxHeight / 2)
            .attr("y", -45)
            .text("Lap Time (s)");

        boxSvg.append("text")
            .attr("class", "axis-label")
            .attr("text-anchor", "middle")
            .attr("x", boxWidth / 2)
            .attr("y", boxHeight + 80)
            .text("Driver");

        boxSvg.append("text")
            .attr("class", "axis-label")
            .attr("x", 0)
            .attr("y", -12)
            .style("fill", "#6b7280")
            .style("font-style", "italic")
            .text("Box = Q1-Q3 \u00b7 solid = median \u00b7 dashed = mean \u00b7 whiskers = 99% of a fitted normal distribution \u00b7 dots = outliers");

        const bandwidth = xBand.bandwidth();
        const boxWidthPx = Math.min(bandwidth, 40);
        const boxLeftOffset = (bandwidth - boxWidthPx) / 2;

        boxCarKeys.forEach(carNumber => {
            const stats = boxStatsByCar.get(carNumber);
            const color = colorScale(carNumber);
            const bandX = xBand(carNumber);
            const centerX = bandX + bandwidth / 2;
            const boxX = bandX + boxLeftOffset;

            const carGroup = boxSvg.append("g")
                .attr("class", `car-box car-box-${carNumber}`);

            // Whiskers + caps
            carGroup.append("line")
                .attr("class", "whisker")
                .attr("x1", centerX).attr("x2", centerX)
                .attr("y1", yBox(stats.whiskerLow)).attr("y2", yBox(stats.q1))
                .attr("stroke", color).attr("stroke-width", 1.5);

            carGroup.append("line")
                .attr("class", "whisker")
                .attr("x1", centerX).attr("x2", centerX)
                .attr("y1", yBox(stats.q3)).attr("y2", yBox(stats.whiskerHigh))
                .attr("stroke", color).attr("stroke-width", 1.5);

            carGroup.append("line")
                .attr("class", "cap")
                .attr("x1", centerX - boxWidthPx * 0.25).attr("x2", centerX + boxWidthPx * 0.25)
                .attr("y1", yBox(stats.whiskerLow)).attr("y2", yBox(stats.whiskerLow))
                .attr("stroke", color).attr("stroke-width", 1.5);

            carGroup.append("line")
                .attr("class", "cap")
                .attr("x1", centerX - boxWidthPx * 0.25).attr("x2", centerX + boxWidthPx * 0.25)
                .attr("y1", yBox(stats.whiskerHigh)).attr("y2", yBox(stats.whiskerHigh))
                .attr("stroke", color).attr("stroke-width", 1.5);

            // Box (Q1 - Q3)
            carGroup.append("rect")
                .attr("class", "box-rect")
                .attr("x", boxX)
                .attr("y", yBox(stats.q3))
                .attr("width", boxWidthPx)
                .attr("height", Math.max(1, yBox(stats.q1) - yBox(stats.q3)))
                .attr("fill", color)
                .attr("fill-opacity", 0.15)
                .attr("stroke", color)
                .attr("stroke-width", 1.5);

            // Median: solid line
            carGroup.append("line")
                .attr("class", "median-line")
                .attr("x1", boxX).attr("x2", boxX + boxWidthPx)
                .attr("y1", yBox(stats.median)).attr("y2", yBox(stats.median))
                .attr("stroke", color)
                .attr("stroke-width", 2);

            // Mean: dashed line
            carGroup.append("line")
                .attr("class", "mean-line")
                .attr("x1", boxX).attr("x2", boxX + boxWidthPx)
                .attr("y1", yBox(stats.mean)).attr("y2", yBox(stats.mean))
                .attr("stroke", color)
                .attr("stroke-width", 2)
                .attr("stroke-dasharray", "5,3");

            // Outliers: individual dots
            carGroup.selectAll(".outlier-dot")
                .data(stats.outliers)
                .enter()
                .append("circle")
                .attr("class", "outlier-dot")
                .attr("cx", centerX)
                .attr("cy", d => yBox(d))
                .attr("r", 3)
                .attr("fill", color)
                .attr("fill-opacity", 0.85)
                .attr("stroke", "#ffffff")
                .attr("stroke-width", 0.75);

            carGroup.append("title")
                .text(
                    `Car ${carNumber} - ${driverNames[carNumber] || "Unknown"}\n` +
                    `Mean: ${stats.mean.toFixed(3)}s | Median: ${stats.median.toFixed(3)}s\n` +
                    `Q1: ${stats.q1.toFixed(3)}s | Q3: ${stats.q3.toFixed(3)}s\n` +
                    `Whiskers (99% of fitted normal dist.): ${stats.whiskerLow.toFixed(3)}s - ${stats.whiskerHigh.toFixed(3)}s\n` +
                    `Outliers: ${stats.outliers.length} of ${stats.n} laps`
                );
        });
    }

</script>
