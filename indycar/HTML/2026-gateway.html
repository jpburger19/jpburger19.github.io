    <title>INDYCAR Data Analysis</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        /* Hallmark · pre-emit critique: P4 H4 E4 S4 R5 V4
         * genre: sport-editorial · theme: Sport — crisp near-white paper, uppercase Inter Tight display,
         *   Albert Sans body, burnt-orange accent, sharp corners / no shadow.
         * Scope note: only page chrome (type, panel, legend, axis, grid, button chrome) is retheme'd.
         *   The per-driver colorScale (d3.schemeTableau10 + schemeSet1) is a data encoding, not a brand
         *   color, and is left untouched so drivers stay distinguishable.
         * nav: minimal breadcrumb bar (back to race index) — utility sub-page, no full nav chrome.
         */
        :root {
            --color-paper:    #f7f8fa;
            --color-paper-2:  #eef0f3;
            --color-paper-3:  #e3e6ea;
            --color-rule:     #c7cbd1;
            --color-rule-2:   #4b4f5c;
            --color-muted:    #6b7280;
            --color-neutral:  #494b57;
            --color-ink-2:    #2c2e38;
            --color-ink:      #1c1e26;
            --color-accent:      #c2410c;
            --color-accent-ink:  #b23a0b;
            --color-accent-tint: #ffedd5;
            --color-accent-tint-border: #f0975a;
            --font-display: "Inter Tight", "Albert Sans", ui-sans-serif, sans-serif;
            --font-body:    "Albert Sans", "Hanken Grotesk", ui-sans-serif, sans-serif;
            --font-label:   "JetBrains Mono", ui-monospace, monospace;
        }
        * { box-sizing: border-box; }
        html { overflow-x: clip; }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0 0 60px;
            font-family: var(--font-body);
            background: var(--color-paper);
            color: var(--color-ink-2);
            overflow-x: clip;
        }
        .wrap { width: 100%; max-width: 1200px; padding: 0 clamp(1.25rem, 4vw, 3rem); }
        .utility-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--color-rule);
            margin-bottom: 1.5rem;
        }
        .back-link {
            font-family: var(--font-label);
            font-size: 0.75rem;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--color-neutral);
            text-decoration: none;
            transition: color 180ms ease;
        }
        .back-link:hover { color: var(--color-accent-ink); }
        .season-tag {
            font-family: var(--font-label);
            font-size: 0.75rem;
            letter-spacing: 0.10em;
            text-transform: uppercase;
            color: var(--color-accent-ink);
            border: 1px solid var(--color-accent-ink);
            padding: 3px 10px;
        }
        h1 {
            font-family: var(--font-display);
            font-weight: 800;
            font-style: normal;
            text-transform: uppercase;
            letter-spacing: -0.03em;
            line-height: 1.05;
            font-size: clamp(1.75rem, 3vw + 1rem, 2.5rem);
            color: var(--color-ink);
            margin: 0 0 0.5rem;
        }
        .section-label {
            display: flex;
            align-items: baseline;
            gap: 0.75rem;
            margin: 2.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--color-rule);
        }
        .section-label .idx {
            font-family: var(--font-label);
            font-size: 0.75rem;
            color: var(--color-accent-ink);
        }
        .section-label h2 {
            font-family: var(--font-display);
            font-weight: 700;
            font-style: normal;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            font-size: 1.25rem;
            color: var(--color-ink);
            margin: 0;
        }
        .chart-panel {
            position: relative;
            border: 1px solid var(--color-rule);
            border-radius: 0;
            background: var(--color-paper);
            padding: 1rem;
            overflow-x: auto;
        }
        .fullscreen-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 5;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-label);
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-neutral);
            background: var(--color-paper);
            border: 1px solid var(--color-rule);
            padding: 5px 10px;
            cursor: pointer;
            transition: color 180ms ease, border-color 180ms ease;
        }
        .fullscreen-btn:hover {
            color: var(--color-accent-ink);
            border-color: var(--color-accent-ink);
        }
        .fullscreen-btn svg { flex: none; }
        .chart-legend {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid var(--color-rule);
            font-family: var(--font-label);
            font-size: 0.72rem;
            line-height: 1.6;
            color: var(--color-muted);
            max-width: 900px;
        }
        .chart-legend strong {
            color: var(--color-ink-2);
            font-weight: 600;
        }
        .chart-legend .legend-symbols {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 20px;
            margin-top: 6px;
        }
        .chart-legend .legend-symbols b {
            color: var(--color-accent-ink);
            margin-right: 4px;
            font-size: 0.85rem;
        }
        .consistency-toolbar {
            display: flex;
            justify-content: flex-end;
            margin-top: 34px;
            margin-bottom: 10px;
        }
        .chart-filter-btn {
            font-family: var(--font-label);
            font-size: 0.72rem;
            letter-spacing: 0.04em;
            color: var(--color-neutral);
            background: var(--color-paper);
            border: 1px solid var(--color-rule);
            padding: 6px 12px;
            cursor: pointer;
            transition: color 180ms ease, border-color 180ms ease, background 180ms ease;
        }
        .chart-filter-btn:hover {
            color: var(--color-accent-ink);
            border-color: var(--color-accent-ink);
        }
        .chart-filter-btn.is-active {
            color: var(--color-accent-ink);
            background: var(--color-accent-tint);
            border-color: var(--color-accent-tint-border);
        }
        /* Maximize overlay — a plain fixed-position layer we control
           completely, instead of the native Fullscreen API. Different
           browsers (notably Firefox) size/position the ":fullscreen"
           element in ways that don't always respect author CSS the same
           way, so this sidesteps that entirely. */
        .chart-maximize-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: var(--color-paper);
            overflow: hidden;
        }
        .chart-maximize-overlay.is-open { display: block; }
        .chart-maximize-overlay .maximize-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: center center;
        }
        .chart-maximize-close {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 3001;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-label);
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-neutral);
            background: var(--color-paper);
            border: 1px solid var(--color-rule);
            padding: 7px 14px;
            cursor: pointer;
            transition: color 180ms ease, border-color 180ms ease;
        }
        .chart-maximize-close:hover {
            color: var(--color-accent-ink);
            border-color: var(--color-accent-ink);
        }
        .chart-maximize-title {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 3001;
            font-family: var(--font-display);
            font-weight: 800;
            font-style: normal;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            font-size: 1.1rem;
            color: var(--color-ink);
            max-width: calc(100vw - 220px);
            overflow-wrap: anywhere;
        }
        .chart-maximize-title .idx {
            font-family: var(--font-label);
            font-size: 0.75rem;
            letter-spacing: 0.10em;
            color: var(--color-accent-ink);
            text-transform: uppercase;
            margin-right: 8px;
        }
        .line {
            fill: none;
            stroke-width: 3;
        }
        .dot {
            stroke: var(--color-paper);
            stroke-width: 1.5;
            cursor: pointer;
        }
        .dot:hover {
            r: 7;
        }
        .axis-label {
            font-family: var(--font-label);
            font-size: 11px;
            fill: var(--color-neutral);
        }
        .grid line {
            stroke: var(--color-rule);
            stroke-opacity: 0.7;
            shape-rendering: crispEdges;
        }
        .grid path {
            stroke-width: 0;
        }
        .legend-text {
            font-family: var(--font-label);
            font-size: 11px;
            fill: var(--color-neutral);
        }
        .legend-row {
            cursor: pointer;
        }
        .legend-btn-bg {
            fill: var(--color-paper);
            stroke: var(--color-rule);
            stroke-width: 1;
        }
        .legend-row:hover .legend-btn-bg {
            fill: var(--color-paper-3);
            stroke: var(--color-rule-2);
        }
        .legend-row.hidden .legend-btn-bg {
            fill: var(--color-paper-2);
        }
        .legend-row.hidden .legend-text {
            fill: #9ca3af;
            text-decoration: line-through;
        }
        .legend-row.hidden .legend-swatch {
            stroke-opacity: 0.25;
        }
        .legend-row:hover .legend-swatch {
            stroke-width: 5;
        }
        .legend-color-input {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            border: none;
            cursor: pointer;
            background: none;
        }
    </style>
</head>

    // Pit stop laps and full-course caution (yellow flag) laps both show up

    // noticeably slower than the field's normal green-flag pace. Rather than
    // a track-specific cutoff (some tracks run ~20s laps, others ~90s+), any
    // lap more than 5% slower than the field's median lap is treated as one
    // of these and filtered out. This scales automatically per track.
    function filterRaceData(raceData) {
        const afterLap1 = raceData.filter(d => d.lap > 1);
        const median = d3.median(afterLap1, d => d.time);
        const upperFence = median * 1.05;
        return afterLap1.filter(d => d.time <= upperFence);

    // FILTER OUT LAP 1, COOL DOWN LAP, PIT STOPS, and YELLOW FLAG OUTLIERS
    const data = filterRaceData(rawData);

    // Group the data by Car Number
    const sumData = d3.group(data, d => d.car);

    // Dimensions and Margins
    const margin = { top: 40, right: 350, bottom: 50, left: 60 };
    const width = 1685 - margin.left - margin.right;
    const height = 800 - margin.top - margin.bottom;

    const svg = d3.select("#chart")

            .attr("height", height + margin.top + margin.bottom)
        .append("g")
            .attr("transform", `translate(${margin.left},${margin.top})`);

    // Scales (Modified domains)
    const xScale = d3.scaleLinear()
        .domain([0, 260]) // Explicitly start X-axis domain at 0
        .range([0, width]);

    const yScale = d3.scaleLinear()
        .domain([26, 30]) // Explicitly lock Y-axis domain to range 26 to 30
        .range([height, 0]);

    // Color Scale
    // Rainbow interpolation still puts some hues (e.g. adjacent greens/cyans)
    // too close together at 25+ samples. Instead, stitch together several
    // hand-tuned categorical palettes (each internally designed for maximum
    // contrast) so we get up to 27 genuinely distinct colors.
    const carKeys = Array.from(sumData.keys());
    const combinedPalette = [
        ...d3.schemeTableau10,
        ...d3.schemeDark2,
        ...d3.schemeSet1
    ];
    const colorScale = d3.scaleOrdinal()
        .domain(carKeys)
        .range(combinedPalette.slice(0, carKeys.length));

    // Dash Scale
    // Even with distinct colors, some can still look similar at a glance
    // (e.g. under color-vision deficiency, or on a small screen). To make
    // every other line unmistakably distinct, alternate lines are dashed.
    const dashPatterns = ["", "6,4"]; // solid, dashed
    const dashScale = d3.scaleOrdinal()
        .domain(carKeys)
        .range(carKeys.map((_, i) => dashPatterns[i % 2]));

    // Line Generator
    const lineGenerator = d3.line()
        .x(d => xScale(d.lap))
        .y(d => yScale(d.time))
        .curve(d3.curveMonotoneX);

    // --- Dynamic tick generation ---
    // Rather than a fixed tick list, we compute a "nice" step (1, 2, 5, 10...)
    // for whatever domain is currently visible, then round to a minimum
    // granularity so ticks never look duplicated or over-precise:
    //   x-axis (laps): never finer than whole laps (minStep = 1)
    //   y-axis (lap time): never finer than tenths of a second (minStep = 0.1)
    function computeNiceStep(d0, d1, targetCount, minStep) {
        let step = d3.tickStep(d0, d1, targetCount);
        if (minStep !== undefined && step < minStep) step = minStep;
        return step;
    }

    function computeTickValues(d0, d1, step) {
        const start = Math.ceil(d0 / step) * step;
        const epsilon = step / 1e6;
        const values = [];
        for (let v = start; v <= d1 + epsilon; v += step) {
            values.push(Math.round(v / step) * step); // snap off floating-point drift
        }
        return values;
    }

    function decimalsForStep(step) {
        if (step >= 1) return 0;
        const s = step.toFixed(10).replace(/0+$/, "");
        const idx = s.indexOf(".");
        return idx === -1 ? 0 : s.length - idx - 1;
    }

    // Clip path so zoomed/panned content never spills outside the plot area

    // Draws/updates the axes and gridlines for whatever x/y scales are
    // currently in effect (called once for the initial view, then again on
    // every zoom/pan event with the rescaled scales).
    function renderAxes(currentX, currentY) {
        const [x0, x1] = currentX.domain();
        const [y0, y1] = currentY.domain();

        const xStep = computeNiceStep(x0, x1, 12, 1);
        const xTicks = computeTickValues(x0, x1, xStep);

        const yStep = computeNiceStep(y0, y1, 6, 0.1);
        const yTicks = computeTickValues(y0, y1, yStep);
        const yDecimals = decimalsForStep(yStep);

        xAxisGroup.call(
            d3.axisBottom(currentX).tickValues(xTicks).tickFormat(d3.format("d"))
        );
        yAxisGroup.call(
            d3.axisLeft(currentY).tickValues(yTicks).tickFormat(d3.format(`.${yDecimals}f`))
        );
        gridGroup.call(
            d3.axisLeft(currentY).tickValues(yTicks).tickSize(-width).tickFormat("")
        );
    }

    // Initial (un-zoomed) render
    renderAxes(xScale, yScale);

    // Labels
    svg.append("text")
        .attr("class", "axis-label")
        .attr("text-anchor", "middle")

    svg.append("text")

        .attr("text-anchor", "middle")

    // Group that holds the lines, clipped to the plot area so zooming/panning

    const plotArea = svg.append("g")
        .attr("clip-path", "url(#plot-clip)");

    // Draw Multiple Lines
    const linePaths = plotArea.selectAll(".line-path")

        .enter()
        .append("path")
        .attr("class", d => `line car-line car-line-${d[0]}`)
        .attr("d", d => lineGenerator(d[1])) 
        .attr("stroke", d => colorScale(d[0]))
        .attr("stroke-dasharray", d => dashScale(d[0]));
/*
    // Add Interactive Data Points for all cars
    svg.selectAll(".dot")

        .enter()
        .append("circle")

        .attr("cx", d => xScale(d.lap))

    // Add the Legend

    // Vertical offset for the per-driver rows, to leave room for the button
    const legendRowsTop = 36;

    const legendRows = legend.append("g")

    // Row sizing: wide enough for the longest driver name plus a color swatch

    // Keep the button label in sync with the current show/hide state:
    // "Hide All" when at least one line is still visible, "Show All" once
    // every line has been hidden.
    function updateToggleButtonLabel() {
        const allHidden = legendRows.selectAll(".legend-row").size() ===
            legendRows.selectAll(".legend-row.hidden").size();
        toggleButtonText.text(allHidden ? "Show All" : "Hide All");

    toggleButton.on("click", function () {
        const shouldHide = toggleButtonText.text() === "Hide All";

        legendRows.selectAll(".legend-row")
            .classed("hidden", shouldHide)
            .each(function (d) {

                svg.select(`.car-line-${carNumber}`)
                    .style("display", shouldHide ? "none" : null);

        toggleButtonText.text(shouldHide ? "Show All" : "Hide All");
    });

    // --- Zoom / Pan interactivity ---
    // Scroll or pinch to zoom, drag to pan, double-click (or the Reset Zoom
    // button) to return to the original view. Mirrors the interaction model
    // from https://observablehq.com/@d3/zoomable-bar-chart, adapted for a
    // multi-line chart: on every zoom event we rescale both axes and redraw
    // the lines against the rescaled x/y scales rather than swapping bar
    // widths.
    //
    // Two things kept this smooth even when fully zoomed in and dragging:
    //  1. Panning fires many more "zoom" events than the screen can actually
    //     repaint, so raw work is batched into at most one redraw per
    //     animation frame instead of once per event.
    //  2. Every car's full ~90-point lap history was being run through the
    //     line generator on every redraw, even though only a handful of laps
    //     are visible when zoomed all the way in. Each car's points are now
    //     sliced down to the visible lap range (plus a small buffer) with a
    //     binary search before being handed to the line generator.
    const bisectLap = d3.bisector(d => d.lap).left;

    function getVisibleSlice(points, lapMin, lapMax) {
        const buffer = 2; // keep a couple laps on either side for smooth edges
        let i0 = bisectLap(points, lapMin - buffer);
        let i1 = bisectLap(points, lapMax + buffer);
        i0 = Math.max(0, i0 - 1);
        i1 = Math.min(points.length, i1 + 1);
        return points.slice(i0, i1);
    }

    // Track whatever x/y scales are currently in effect (identity by
    // default, rescaled while zoomed) so lap-range math for Compare Laps
    // stays correct no matter the current zoom/pan position.
    let currentXScale = xScale;
    let currentYScale = yScale;

    function draw(transform) {
        const newX = transform.rescaleX(xScale);
        const newY = transform.rescaleY(yScale);
        currentXScale = newX;
        currentYScale = newY;

        renderAxes(newX, newY);

        const [lapMin, lapMax] = newX.domain();
        const zoomedLineGenerator = d3.line()
            .x(d => newX(d.lap))
            .y(d => newY(d.time))
            .curve(d3.curveMonotoneX);

        plotArea.selectAll(".car-line")
            .filter(function () { return this.style.display !== "none"; })
            .attr("d", d => zoomedLineGenerator(getVisibleSlice(d[1], lapMin, lapMax)));
    }

    let pendingTransform = null;
    let rafHandle = null;

    function scheduleDraw(transform) {
        pendingTransform = transform;
        if (rafHandle !== null) return;
        rafHandle = requestAnimationFrame(() => {
            rafHandle = null;
            draw(pendingTransform);
        });
    }

    const zoom = d3.zoom()
        .scaleExtent([1, 25])
        .translateExtent([[0, 0], [width, height]])
        .extent([[0, 0], [width, height]])
        .on("zoom", event => scheduleDraw(event.transform));

    // Transparent overlay that captures scroll/drag gestures over the plot
    // area. Sits on top of the lines but doesn't extend over the legend.
    const zoomOverlay = svg.append("rect")
        .attr("class", "zoom-overlay")
        .attr("width", width)
        .attr("height", height)
        .style("fill", "none")
        .style("pointer-events", "all");

    function resetZoom() {
        zoomOverlay.transition().duration(500).call(zoom.transform, d3.zoomIdentity);
    }

    // Named hint text so Compare Laps mode can swap its wording in and out
    const hintText = svg.append("text")
        .attr("class", "axis-label")
        .attr("x", -20)
        .attr("y", -20)
        .style("fill", "#6b7280")
        .style("font-style", "italic")
        .text("Scroll/pinch to zoom, drag to pan, double-click to reset");

    // The in-progress/last-drawn selection box
    const selectionRect = svg.append("rect")
        .attr("class", "compare-selection")
        .attr("fill", "#c2410c")
        .attr("fill-opacity", 0.12)
        .attr("stroke", "#c2410c")
        .attr("stroke-width", 1.5)
        .attr("stroke-dasharray", "4,3")
        .style("display", "none")
        .style("pointer-events", "none");

    // Result readout, shown once a selection is released
    const compareResultText = svg.append("text")
        .attr("class", "axis-label")
        .attr("x", -20)
        .attr("y", -20)
        .style("fill", "#1d4ed8")
        .style("font-weight", "600")
        .style("display", "none");

    function showCompareMessage(text) {
        hintText.style("display", "none");
        compareResultText.style("display", null).text(text);
    }

    function getVisibleCarKeys() {
        return legendRows.selectAll(".legend-row:not(.hidden)").nodes()
            .map(node => +node.getAttribute("data-car"));
    }

    // Figures out, lap by lap across every currently-visible driver, who
    // posted the faster time, then reports what share of the selected laps
    // each driver won.
    function runComparison(lapMin, lapMax) {
        const visibleCars = getVisibleCarKeys();

        if (visibleCars.length < 2) {
            showCompareMessage("Show at least two drivers (use the legend) to compare them.");
            return;
        }
        if (!Number.isFinite(lapMin) || !Number.isFinite(lapMax) || lapMax <= lapMin) {
            showCompareMessage("Drag out a wider box to select a lap range.");
            return;
        }

        const wins = new Map(visibleCars.map(c => [c, 0]));
        let comparedLaps = 0;

        for (let lap = lapMin; lap <= lapMax; lap++) {
            const timesThisLap = [];
            visibleCars.forEach(carNumber => {
                const point = (sumData.get(carNumber) || []).find(d => d.lap === lap);
                if (point) timesThisLap.push({ car: carNumber, time: point.time });
            });
            if (timesThisLap.length >= 2) {
                comparedLaps++;
                let fastest = timesThisLap[0];
                timesThisLap.forEach(t => { if (t.time < fastest.time) fastest = t; });
                wins.set(fastest.car, wins.get(fastest.car) + 1);
            }
        }

        if (comparedLaps === 0) {
            showCompareMessage(`No overlapping laps with data for laps ${lapMin}-${lapMax}.`);
            return;
        }

        const ranked = Array.from(wins.entries())
            .map(([car, count]) => ({
                car,
                name: driverNames[car] || `Car ${car}`,
                pct: (count / comparedLaps) * 100
            }))
            .sort((a, b) => b.pct - a.pct);

        const MAX_SHOWN = 3;
        const shown = ranked.length > MAX_SHOWN ? ranked.slice(0, MAX_SHOWN) : ranked;
        const truncated = ranked.length > MAX_SHOWN;

        const message = ranked.length === 2
            ? `${ranked[0].name} - faster across ${ranked[0].pct.toFixed(0)}% of selected laps ` +
              `(laps ${lapMin}-${lapMax}, ${comparedLaps} compared)`
            : `Laps ${lapMin}-${lapMax} (${comparedLaps} compared): ` +
              shown.map(r => `${r.name} fastest on ${r.pct.toFixed(0)}%`).join(" \u00b7 ") +
              (truncated ? ` \u00b7 (top ${MAX_SHOWN} of ${ranked.length} drivers shown)` : "");

        showCompareMessage(message);
    }

    // Fully swaps the overlay's event listeners between normal zoom/pan and
    // Compare Laps drag-to-select, rather than trying to run both at once.
    function attachZoomBehavior() {
        zoomOverlay
            .style("cursor", null)
            .call(zoom)
            .on("dblclick.zoom", null)
            .on("dblclick", () => resetZoom());
    }

    function detachZoomBehavior() {
        zoomOverlay.on(".zoom", null).on("dblclick", null);
    }

    function attachCompareBehavior() {
        let startPt = null;

        zoomOverlay
            .style("cursor", "crosshair")
            .on("mousedown.compare", function (event) {
                const [x0, y0] = d3.pointer(event, plotArea.node());
                startPt = [
                    Math.max(0, Math.min(width, x0)),
                    Math.max(0, Math.min(height, y0))
                ];
                selectionRect
                    .attr("x", startPt[0]).attr("y", startPt[1])
                    .attr("width", 0).attr("height", 0)
                    .style("display", null);
                compareResultText.style("display", "none");
                hintText.style("display", null)
                    .text("Drag a box over the lap range you want to compare\u2026");
            })
            .on("mousemove.compare", function (event) {
                if (!startPt) return;
                const [x1, y1] = d3.pointer(event, plotArea.node());
                const cx1 = Math.max(0, Math.min(width, x1));
                const cy1 = Math.max(0, Math.min(height, y1));
                selectionRect
                    .attr("x", Math.min(startPt[0], cx1))
                    .attr("y", Math.min(startPt[1], cy1))
                    .attr("width", Math.abs(cx1 - startPt[0]))
                    .attr("height", Math.abs(cy1 - startPt[1]));
            })
            .on("mouseup.compare", function (event) {
                if (!startPt) return;
                const [x1] = d3.pointer(event, plotArea.node());
                const cx1 = Math.max(0, Math.min(width, x1));
                const rawLapA = currentXScale.invert(startPt[0]);
                const rawLapB = currentXScale.invert(cx1);
                startPt = null;

                const lapMin = Math.round(Math.min(rawLapA, rawLapB));
                const lapMax = Math.round(Math.max(rawLapA, rawLapB));
                runComparison(lapMin, lapMax);
            });
    }

    function detachCompareBehavior() {
        zoomOverlay
            .style("cursor", null)
            .on("mousedown.compare", null)
            .on("mousemove.compare", null)
            .on("mouseup.compare", null);
        selectionRect.style("display", "none");
    }

    let compareMode = false;

    function setCompareMode(on) {
        compareMode = on;
        compareResultText.style("display", "none");
        selectionRect.style("display", "none");

        if (on) {
            detachZoomBehavior();
            attachCompareBehavior();
            compareButtonRect.attr("fill", "#ffedd5").attr("stroke", "#f0975a");
            compareButtonText.text("Exit Compare");
            hintText.style("display", null)
                .text("Drag a box over the lap range you want to compare\u2026");
        } else {
            detachCompareBehavior();
            attachZoomBehavior();
            compareButtonRect.attr("fill", "#e3e6ea").attr("stroke", "#c7cbd1");
            compareButtonText.text("Compare Laps");
            hintText.style("display", null)
                .text("Scroll/pinch to zoom, drag to pan, double-click to reset");
        }
    }

    compareButton.on("click", () => setCompareMode(!compareMode));

    // Start in normal zoom/pan mode
    attachZoomBehavior();

    // ================= Box & Whisker Plot: Lap Time Distribution =================
    // Uses the same (pit-stop-filtered) per-car lap data as the line chart
    // above. For each driver:
    //   - box spans Q1-Q3, with a solid line at the median and a dashed
    //     line at the mean
    //   - whiskers are NOT the usual 1.5*IQR convention; instead they're
    //     set from the car's own mean/std so that they bound the middle
    //     99% of a normal distribution fitted to that car's lap times
    //     (mean +/- 2.576 sigma), clipped to the most extreme lap that's
    //     still inside that range
    //   - any lap outside that 99% range is drawn as an individual dot
    //   - drivers are sorted left-to-right by ascending mean lap time
    const boxContainer = d3.select("#boxplot-chart");
    boxContainer.selectAll("*").remove();

    const boxMargin = { top: 30, right: 265, bottom: 90, left: 90 };
    const boxWidth = 1600 - boxMargin.left - boxMargin.right;
    const boxHeight = 800;

    // Keeps a driver's box-plot colors (box, whiskers, caps, median/mean
    // lines, outlier dots) in sync whenever their line color is changed via
    // the legend's color picker. Safe to call before the box plot has been
    // built (e.g. no-op) since it just no-ops on an empty selection.
    function updateBoxPlotColor(carNumber, newColor) {
        const carBoxGroup = d3.select(`.car-box-${carNumber}`);
        if (carBoxGroup.empty()) return;
        carBoxGroup.selectAll(".whisker, .cap, .median-line, .mean-line").attr("stroke", newColor);
        carBoxGroup.select(".box-rect").attr("fill", newColor).attr("stroke", newColor);
        carBoxGroup.selectAll(".outlier-dot").attr("fill", newColor);
    }

    // Compact "Surname (R)" label for the box plot's x-axis, where the full
    // "Car N - Full Name" legend label would be too wide for 25+ categories.
    function shortDriverLabel(carNumber) {
        const full = driverNames[carNumber] || `Car ${carNumber}`;
        //const isRookie = / \(R\)$/.test(full);
        const base = full.replace(/ \(R\)$/, "");
        const parts = base.split(" ");
        const surname = parts[parts.length - 1];
        return surname;
    }

    // Two-tailed z-score such that +/- Z_99 sigma around the mean covers
    // 99% of a normal distribution's probability mass.
    const Z_99 = 2.5758293035489004;

    function computeBoxStats(values) {
        const sorted = values.slice().sort(d3.ascending);
        const n = sorted.length;
        const mean = d3.mean(sorted);
        const std = n > 1 ? d3.deviation(sorted) : 0;
        const median = d3.median(sorted);
        const q1 = d3.quantile(sorted, 0.25);
        const q3 = d3.quantile(sorted, 0.75);

        const lowerFence = mean - Z_99 * std;
        const upperFence = mean + Z_99 * std;

        const within = sorted.filter(v => v >= lowerFence && v <= upperFence);
        const whiskerLow = within.length ? within[0] : sorted[0];
        const whiskerHigh = within.length ? within[within.length - 1] : sorted[n - 1];
        const outliers = sorted.filter(v => v < lowerFence || v > upperFence);

        return { mean, median, std, q1, q3, whiskerLow, whiskerHigh, outliers, n };
    }

    const boxStatsByCar = new Map();
    carKeys.forEach(carNumber => {
        const values = (sumData.get(carNumber) || []).map(d => d.time);
        if (values.length > 0) {
            boxStatsByCar.set(carNumber, computeBoxStats(values));
        }
    });

    if (boxStatsByCar.size === 0) {
        boxContainer.append("p")
            .style("font-family", "sans-serif")
            .style("color", "#6b7280")
            .style("padding", "20px")
            .text("Not enough data to build a box plot for this race.");
    } else {
        const boxCarKeys = carKeys
            .filter(c => boxStatsByCar.has(c))
            .sort((a, b) => boxStatsByCar.get(a).mean - boxStatsByCar.get(b).mean);

        const boxSvg = boxContainer
            .append("svg")
                .attr("width", boxWidth + boxMargin.left + boxMargin.right)
                .attr("height", boxHeight + boxMargin.top + boxMargin.bottom)
            .append("g")
                .attr("transform", `translate(${boxMargin.left},${boxMargin.top})`);

        const xBand = d3.scaleBand()
            .domain(boxCarKeys)
            .range([0, boxWidth])
            .padding(0.4);

        // Y domain must fit every whisker end and every outlier
        let yMin = Infinity;
        let yMax = -Infinity;
        boxStatsByCar.forEach(stats => {
            yMin = Math.min(yMin, stats.whiskerLow, d3.min(stats.outliers) ?? Infinity);
            yMax = Math.max(yMax, stats.whiskerHigh, d3.max(stats.outliers) ?? -Infinity);
        });
        const yBoxPad = (yMax - yMin) * 0.08 || 1;
        const yBox = d3.scaleLinear()
            .domain([yMin - yBoxPad, yMax + yBoxPad])
            .nice()
            .range([boxHeight, 0]);

        // Clip path so the rotated driver-name ticks below the axis never
        // spill into the surrounding margin.
        boxSvg.append("defs").append("clipPath")
            .attr("id", "box-xaxis-clip")
            .append("rect")
            .attr("x", -80)
            .attr("y", -6)
            .attr("width", boxWidth + 80)
            .attr("height", 100);

        // Gridlines
        boxSvg.append("g")
            .attr("class", "grid")
            .call(d3.axisLeft(yBox).ticks(8).tickSize(-boxWidth).tickFormat(""));

        // X axis: one tick per driver, rotated so labels don't collide
        boxSvg.append("g")
            .attr("class", "box-x-axis-group")
            .attr("clip-path", "url(#box-xaxis-clip)")
            .attr("transform", `translate(0,${boxHeight})`)
            .call(d3.axisBottom(xBand).tickFormat(shortDriverLabel))
            .selectAll("text")
                .attr("class", "axis-label")
                .attr("transform", "rotate(-40)")
                .style("text-anchor", "end")
                .attr("dx", "-0.6em")
                .attr("dy", "0.15em");

        boxSvg.append("g")
            .call(d3.axisLeft(yBox).ticks(8));

        boxSvg.append("text")
            .attr("class", "axis-label")
            .attr("text-anchor", "middle")
            .attr("transform", "rotate(-90)")
            .attr("x", -boxHeight / 2)
            .attr("y", -45)
            .text("Lap Time (s)");

        boxSvg.append("text")
            .attr("class", "axis-label")
            .attr("text-anchor", "middle")
            .attr("x", boxWidth / 2)
            .attr("y", boxHeight + 80)
            .text("Driver (Sorted by Mean Lap Time)");

        boxSvg.append("text")
            .attr("class", "axis-label")
            .attr("x", 0)
            .attr("y", -12)
            .style("fill", "#6b7280")
            .style("font-style", "italic")
            .text("Box = Q1-Q3 \u00b7 solid = median \u00b7 dashed = mean \u00b7 whiskers = 99% of a fitted normal distribution \u00b7 dots = outliers");

        const bandwidth = xBand.bandwidth();
        const boxWidthPx = Math.min(bandwidth, 40);
        const boxLeftOffset = (bandwidth - boxWidthPx) / 2;

        boxCarKeys.forEach(carNumber => {
            const stats = boxStatsByCar.get(carNumber);
            const color = colorScale(carNumber);
            const bandX = xBand(carNumber);
            const centerX = bandX + bandwidth / 2;
            const boxX = bandX + boxLeftOffset;

            const carGroup = boxSvg.append("g")
                .attr("class", `car-box car-box-${carNumber}`);

            // Whiskers + caps
            carGroup.append("line")
                .attr("class", "whisker")
                .attr("x1", centerX).attr("x2", centerX)
                .attr("y1", yBox(stats.whiskerLow)).attr("y2", yBox(stats.q1))
                .attr("stroke", color).attr("stroke-width", 1.5);

            carGroup.append("line")
                .attr("class", "whisker")
                .attr("x1", centerX).attr("x2", centerX)
                .attr("y1", yBox(stats.q3)).attr("y2", yBox(stats.whiskerHigh))
                .attr("stroke", color).attr("stroke-width", 1.5);

            carGroup.append("line")
                .attr("class", "cap")
                .attr("x1", centerX - boxWidthPx * 0.25).attr("x2", centerX + boxWidthPx * 0.25)
                .attr("y1", yBox(stats.whiskerLow)).attr("y2", yBox(stats.whiskerLow))
                .attr("stroke", color).attr("stroke-width", 1.5);

            carGroup.append("line")
                .attr("class", "cap")
                .attr("x1", centerX - boxWidthPx * 0.25).attr("x2", centerX + boxWidthPx * 0.25)
                .attr("y1", yBox(stats.whiskerHigh)).attr("y2", yBox(stats.whiskerHigh))
                .attr("stroke", color).attr("stroke-width", 1.5);

            // Box (Q1 - Q3)
            carGroup.append("rect")
                .attr("class", "box-rect")
                .attr("x", boxX)
                .attr("y", yBox(stats.q3))
                .attr("width", boxWidthPx)
                .attr("height", Math.max(1, yBox(stats.q1) - yBox(stats.q3)))
                .attr("fill", color)
                .attr("fill-opacity", 0.15)
                .attr("stroke", color)
                .attr("stroke-width", 1.5);

            // Median: solid line
            carGroup.append("line")
                .attr("class", "median-line")
                .attr("x1", boxX).attr("x2", boxX + boxWidthPx)
                .attr("y1", yBox(stats.median)).attr("y2", yBox(stats.median))
                .attr("stroke", color)
                .attr("stroke-width", 2);

            // Mean: dashed line
            carGroup.append("line")
                .attr("class", "mean-line")
                .attr("x1", boxX).attr("x2", boxX + boxWidthPx)
                .attr("y1", yBox(stats.mean)).attr("y2", yBox(stats.mean))
                .attr("stroke", color)
                .attr("stroke-width", 2)
                .attr("stroke-dasharray", "5,3");

            // Outliers: individual dots
            carGroup.selectAll(".outlier-dot")
                .data(stats.outliers)
                .enter()
                .append("circle")
                .attr("class", "outlier-dot")
                .attr("cx", centerX)
                .attr("cy", d => yBox(d))
                .attr("r", 3)
                .attr("fill", color)
                .attr("fill-opacity", 0.85)
                .attr("stroke", "#ffffff")
                .attr("stroke-width", 0.75);

            carGroup.append("title")
                .text(
                    `Car ${carNumber} - ${driverNames[carNumber] || "Unknown"}\n` +
                    `Mean: ${stats.mean.toFixed(3)}s | Median: ${stats.median.toFixed(3)}s\n` +
                    `Q1: ${stats.q1.toFixed(3)}s | Q3: ${stats.q3.toFixed(3)}s\n` +
                    `Whiskers (99% of fitted normal dist.): ${stats.whiskerLow.toFixed(3)}s - ${stats.whiskerHigh.toFixed(3)}s\n` +
                    `Outliers: ${stats.outliers.length} of ${stats.n} laps`
                );
        });
    }

    /* ══════════════════════════════════════════════════════════════
       CHART 3 · FASTEST LAP LEADERBOARD
       Single quickest clean lap per driver (pit/caution laps already
       excluded by filterRaceData, same methodology as the other charts),
       ranked fastest-to-slowest, bars encode the gap back to the
       outright fastest lap of the race.
       ══════════════════════════════════════════════════════════════ */
    (function renderFastestLapChart() {
        const container = d3.select("#fastest-lap-chart");
        container.selectAll("*").remove();

        const fastestByCar = carKeys
            .map(car => {
                const laps = sumData.get(car) || [];
                if (laps.length === 0) return null;
                const best = laps.reduce((a, b) => (a.time < b.time ? a : b));
                return { car, time: best.time, lap: best.lap };
            })
            .filter(Boolean)
            .sort((a, b) => a.time - b.time);

        if (fastestByCar.length === 0) {
            container.append("p")
                .attr("class", "axis-label")
                .style("padding", "20px")
                .text("Not enough data to build a fastest-lap leaderboard for this race.");
            return;
        }

        const outrightFastest = fastestByCar[0].time;

        const flMargin = { top: 10, right: 140, bottom: 55, left: 190 };
        const flRowHeight = 26;
        const flWidth = 900;
        const flHeight = fastestByCar.length * flRowHeight;

        const flSvg = container.append("svg")
                .attr("width", flWidth + flMargin.left + flMargin.right)
                .attr("height", flHeight + flMargin.top + flMargin.bottom)
            .append("g")
                .attr("transform", `translate(${flMargin.left},${flMargin.top})`);

        const flMaxDelta = d3.max(fastestByCar, d => d.time - outrightFastest) || 1;
        const flX = d3.scaleLinear()
            .domain([0, flMaxDelta * 1.12])
            .range([0, flWidth]);

        const flY = d3.scaleBand()
            .domain(fastestByCar.map(d => d.car))
            .range([0, flHeight])
            .padding(0.28);

        // Gridlines (delta seconds)
        flSvg.append("g")
            .attr("class", "grid")
            .call(d3.axisBottom(flX).ticks(6).tickSize(flHeight).tickFormat(""))
            .attr("transform", `translate(0,0)`)
            .lower();

        const flRows = flSvg.selectAll(".fl-row")
            .data(fastestByCar)
            .enter()
            .append("g")
            .attr("class", "fl-row")
            .attr("transform", d => `translate(0, ${flY(d.car)})`);

        // Driver name, left of the axis
        flRows.append("text")
            .attr("class", "axis-label")
            .attr("x", -12)
            .attr("y", flY.bandwidth() / 2)
            .attr("dy", "0.32em")
            .attr("text-anchor", "end")
            .style("font-weight", 600)
            .text(d => `${shortDriverLabel(d.car)}`);

        // Bar
        flRows.append("rect")
            .attr("x", 0)
            .attr("y", 2)
            .attr("height", flY.bandwidth() - 4)
            .attr("width", d => Math.max(3, flX(d.time - outrightFastest)))
            .attr("fill", d => colorScale(d.car))
            .attr("fill-opacity", 0.85)
            .attr("rx", 0)
            .append("title")
                .text(d =>
                    `Car ${d.car} - ${driverNames[d.car] || "Unknown"}\n` +
                    `Fastest lap: ${d.time.toFixed(3)}s (lap ${d.lap})\n` +
                    (d.time === outrightFastest ? "Outright fastest lap of the race" : `+${(d.time - outrightFastest).toFixed(3)}s off the pace`)
                );

        // Value label at bar end
        flRows.append("text")
            .attr("class", "axis-label")
            .attr("x", d => flX(d.time - outrightFastest) + 8)
            .attr("y", flY.bandwidth() / 2)
            .attr("dy", "0.32em")
            .text(d => d.time === outrightFastest
                ? `${d.time.toFixed(3)}s (fastest lap)`
                : `${d.time.toFixed(3)}s (+${(d.time - outrightFastest).toFixed(3)}s)`);

        // X axis (delta scale)
        flSvg.append("g")
            .attr("class", "axis-label")
            .attr("transform", `translate(0, ${flHeight + 10})`)
            .call(d3.axisBottom(flX).ticks(6).tickFormat(d => `+${d.toFixed(1)}s`));

        flSvg.append("text")
            .attr("class", "axis-label")
            .attr("x", flWidth / 2)
            .attr("y", flHeight + 52)
            .attr("text-anchor", "middle")
            .text("Gap (s)");
    })();

    /* ══════════════════════════════════════════════════════════════
       CHART 4 · CONSISTENCY VS. PACE
       Per-driver scatter using the same mean/std already computed for
       the box plot: x = average clean-lap pace, y = lap-to-lap
       variability. Bottom-left is the sweet spot — fast AND repeatable.
       ══════════════════════════════════════════════════════════════ */
    let consistencyCompletedOnly = false;

    function renderConsistencyChart() {
        const container = d3.select("#consistency-chart");

        // Toolbar (filter button) is built once and just relabeled on
        // later calls, so it survives re-renders and stays put in the
        // maximized/fullscreen view too (it lives inside the same
        // #consistency-chart div that gets moved there).
        let toolbar = container.select(".consistency-toolbar");
        if (toolbar.empty()) {
            toolbar = container.append("div").attr("class", "consistency-toolbar");
            toolbar.append("button")
                .attr("type", "button")
                .attr("class", "chart-filter-btn")
                .append("span");
            toolbar.select("button").on("click", () => {
                consistencyCompletedOnly = !consistencyCompletedOnly;
                renderConsistencyChart();
            });
        }
        toolbar.select(".chart-filter-btn").classed("is-active", consistencyCompletedOnly);
        toolbar.select(".chart-filter-btn span")
            .text(consistencyCompletedOnly
                ? "Showing drivers who completed \u226550% of the race \u2014 click to show all"
                : "Filter out drivers who completed < 50% of the race");

        let chartArea = container.select(".consistency-chart-area");
        if (chartArea.empty()) {
            chartArea = container.append("div").attr("class", "consistency-chart-area");
        }
        chartArea.selectAll("*").remove();

        // Laps actually completed per car, from the raw (unfiltered) data —
        // sumData/boxStatsByCar already exclude lap 1 and pit/outlier laps,
        // which would undercount how far a car actually got in the race.
        const totalRaceLaps = d3.max(rawData, d => d.lap) || 1;
        const lapsCompletedByCar = new Map();
        carKeys.forEach(car => {
            const carRows = rawData.filter(d => d.car === car);
            lapsCompletedByCar.set(car, carRows.length ? d3.max(carRows, d => d.lap) : 0);
        });

        const eligibleCarKeys = consistencyCompletedOnly
            ? carKeys.filter(car => (lapsCompletedByCar.get(car) || 0) / totalRaceLaps >= 0.5)
            : carKeys;

        const points = eligibleCarKeys
            .map(car => {
                const stats = boxStatsByCar.get(car);
                if (!stats || stats.n < 2) return null;
                return { car, mean: stats.mean, std: stats.std, n: stats.n };
            })
            .filter(Boolean);

        if (points.length === 0) {
            chartArea.append("p")
                .attr("class", "axis-label")
                .style("padding", "20px")
                .text("Not enough data to build a consistency chart for this race.");
            return;
        }

        const csMargin = { top: 30, right: 40, bottom: 60, left: 85 };
        const csWidth = 900;
        const csHeight = 560;

        const csSvg = chartArea.append("svg")
                .attr("width", csWidth + csMargin.left + csMargin.right)
                .attr("height", csHeight + csMargin.top + csMargin.bottom)
            .append("g")
                .attr("transform", `translate(${csMargin.left},${csMargin.top})`);

        const meanExtent = d3.extent(points, d => d.mean);
        const stdExtent = d3.extent(points, d => d.std);
        const meanPad = (meanExtent[1] - meanExtent[0]) * 0.12 || 0.5;
        const stdPad = (stdExtent[1] - stdExtent[0]) * 0.15 || 0.05;

        const csX = d3.scaleLinear()
            .domain([meanExtent[0] - meanPad, meanExtent[1] + meanPad])
            .range([0, csWidth]);

        const csY = d3.scaleLinear()
            .domain([stdExtent[0] - stdPad, stdExtent[1] + stdPad])
            .range([csHeight, 0]);

        const medianMean = d3.median(points, d => d.mean);
        const medianStd = d3.median(points, d => d.std);

        // Gridlines
        csSvg.append("g")
            .attr("class", "grid")
            .attr("transform", `translate(0, ${csHeight})`)
            .call(d3.axisBottom(csX).ticks(8).tickSize(-csHeight).tickFormat(""));
        csSvg.append("g")
            .attr("class", "grid")
            .call(d3.axisLeft(csY).ticks(6).tickSize(-csWidth).tickFormat(""));

        // Quadrant divider lines (medians)
        csSvg.append("line")
            .attr("x1", csX(medianMean)).attr("x2", csX(medianMean))
            .attr("y1", 0).attr("y2", csHeight)
            .attr("stroke", "#4b4f5c")
            .attr("stroke-dasharray", "4,3");
        csSvg.append("line")
            .attr("x1", 0).attr("x2", csWidth)
            .attr("y1", csY(medianStd)).attr("y2", csY(medianStd))
            .attr("stroke", "#4b4f5c")
            .attr("stroke-dasharray", "4,3");

        // Quadrant captions
        const quadrantLabel = (x, y, anchor, text) => {
            csSvg.append("text")
                .attr("class", "axis-label")
                .attr("x", x).attr("y", y)
                .attr("text-anchor", anchor)
                .style("fill", "#6b7280")
                .style("letter-spacing", "0.08em")
                .style("text-transform", "uppercase")
                .style("font-size", "10px")
                .text(text);
        };
        quadrantLabel(8, 14, "start", "Fast & inconsistent");
        quadrantLabel(csWidth - 8, 14, "end", "Off the pace & inconsistent");
        quadrantLabel(8, csHeight - 8, "start", "Fast & consistent");
        quadrantLabel(csWidth - 8, csHeight - 8, "end", "Off the pace & consistent");

        // Axes
        csSvg.append("g")
            .attr("class", "axis-label")
            .attr("transform", `translate(0, ${csHeight})`)
            .call(d3.axisBottom(csX).ticks(8).tickFormat(d => `${d.toFixed(1)}s`));
        csSvg.append("g")
            .attr("class", "axis-label")
            .call(d3.axisLeft(csY).ticks(6).tickFormat(d => `${d.toFixed(2)}s`));

        csSvg.append("text")
            .attr("class", "axis-label")
            .attr("x", csWidth / 2)
            .attr("y", csHeight + 42)
            .attr("text-anchor", "middle")
            .text("Average clean-lap pace (lower = faster)");
        csSvg.append("text")
            .attr("class", "axis-label")
            .attr("transform", "rotate(-90)")
            .attr("x", -csHeight / 2)
            .attr("y", -65)
            .attr("text-anchor", "middle")
            .text("Lap-to-lap variability, std. dev. (lower = more consistent)");

        // Points
        const fastestCar = points.reduce((a, b) => (a.mean < b.mean ? a : b)).car;
        const slowestCar = points.reduce((a, b) => (a.mean > b.mean ? a : b)).car;
        const mostConsistentCar = points.reduce((a, b) => (a.std < b.std ? a : b)).car;
        const leastConsistentCar = points.reduce((a, b) => (a.std > b.std ? a : b)).car;
        const calloutCars = new Set([fastestCar, slowestCar, mostConsistentCar, leastConsistentCar]);

        const csPoint = csSvg.selectAll(".cs-point")
            .data(points)
            .enter()
            .append("g")
            .attr("class", "cs-point")
            .attr("transform", d => `translate(${csX(d.mean)}, ${csY(d.std)})`);

        csPoint.append("circle")
            .attr("r", d => calloutCars.has(d.car) ? 7 : 5)
            .attr("fill", d => colorScale(d.car))
            .attr("stroke", "#f7f8fa")
            .attr("stroke-width", 1.25)
            .append("title")
                .text(d =>
                    `Car ${d.car} - ${driverNames[d.car] || "Unknown"}\n` +
                    `Avg. clean-lap pace: ${d.mean.toFixed(3)}s\n` +
                    `Consistency (std. dev.): ${d.std.toFixed(3)}s over ${d.n} laps`
                );

        // Direct labels only for the notable extremes, to keep 25+ points legible.
        // Fixed offsets can land a label on top of a nearby, unrelated point, so
        // each label instead picks whichever of 4 candidate positions (right,
        // left, above, below) collides with the fewest other points/labels.
        const allPx = points.map(p => ({ x: csX(p.mean), y: csY(p.std) }));
        const placedBoxes = [];
        const pointRadius = 7;

        function boxesOverlap(a, b) {
            return a.x0 < b.x1 && a.x1 > b.x0 && a.y0 < b.y1 && a.y1 > b.y0;
        }

        function scoreCandidate(box, ownIndex) {
            if (box.x0 < 0 || box.x1 > csWidth || box.y0 < 0 || box.y1 > csHeight) return Infinity;
            let collisions = 0;
            allPx.forEach((p, i) => {
                if (i === ownIndex) return;
                if (p.x > box.x0 - pointRadius && p.x < box.x1 + pointRadius &&
                    p.y > box.y0 - pointRadius && p.y < box.y1 + pointRadius) collisions++;
            });
            placedBoxes.forEach(b => { if (boxesOverlap(box, b)) collisions += 3; });
            return collisions;
        }

        calloutCars.forEach(car => {
            const idx = points.findIndex(p => p.car === car);
            const d = points[idx];
            const tags = [];
            if (car === fastestCar) tags.push("(+)");
            if (car === mostConsistentCar) tags.push("(^)");
            if (car === slowestCar) tags.push("(-)");
            if (car === leastConsistentCar) tags.push("(*)");
            const label = `${shortDriverLabel(car)} ${tags.join(" ")}`.trim();
            const px = csX(d.mean), py = csY(d.std);
            const w = label.length * 6.3 + 6;
            const h = 14;

            const candidates = [
                { anchor: "start",  x: px + 10, y: py + 4,  x0: px + 8,          x1: px + 8 + w,      y0: py - 10, y1: py + 4 },
                { anchor: "end",    x: px - 10, y: py + 4,  x0: px - 8 - w,      x1: px - 8,          y0: py - 10, y1: py + 4 },
                { anchor: "middle", x: px,      y: py - 14, x0: px - w / 2,      x1: px + w / 2,      y0: py - 24, y1: py - 10 },
                { anchor: "middle", x: px,      y: py + 22, x0: px - w / 2,      x1: px + w / 2,      y0: py + 10, y1: py + 24 }
            ];

            let best = candidates[0];
            let bestScore = Infinity;
            candidates.forEach(c => {
                const s = scoreCandidate(c, idx);
                if (s < bestScore) { bestScore = s; best = c; }
            });
            placedBoxes.push(best);

            csSvg.append("text")
                .attr("class", "axis-label")
                .attr("x", best.x)
                .attr("y", best.y)
                .attr("text-anchor", best.anchor)
                .style("font-weight", 600)
                .text(label);
        });

        // Legend — how the quadrants are drawn, and what the symbols mean.
        chartArea.append("div")
            .attr("class", "chart-legend")
            .html(
                '<div><strong>Quadrants:</strong> vertical dashed line = median average pace ' +
                '\u00b7 horizontal dashed line = median lap-to-lap variability</div>' +
                '<div class="legend-symbols">' +
                '<strong>Symbols:</strong>' +
                '<span><b>(+)</b> fastest average pace</span>' +
                '<span><b>(-)</b> slowest average pace</span>' +
                '<span><b>(^)</b> most consistent</span>' +
                '<span><b>(*)</b> least consistent</span>' +
                '</div>'
            );
    }
    renderConsistencyChart();

    /* ══════════════════════════════════════════════════════════════
       MAXIMIZE BUTTON — one added to every .chart-panel. Rather than
       the native Fullscreen API (whose ":fullscreen" element sizing/
       positioning behaves differently enough across browsers — Firefox
       in particular — that centered content kept ending up pinned to
       the top-left), this moves the chart's own div into a plain
       fixed-position overlay we fully control, then moves it back on
       close. Centering and scale-to-fit are just normal CSS/JS math
       against the viewport, with no browser-specific fullscreen
       behavior involved at all.
       ══════════════════════════════════════════════════════════════ */
    (function attachMaximizeButtons() {
        const expandIcon = '<svg width="12" height="12" viewBox="0 0 13 13" fill="none" aria-hidden="true">' +
            '<path d="M1 4.5V1H4.5M8.5 1H12V4.5M12 8.5V12H8.5M4.5 12H1V8.5" stroke="currentColor" stroke-width="1.3"/></svg>';
        const BUFFER = 56; // breathing room around the scaled chart, in px

        const overlay = document.createElement("div");
        overlay.className = "chart-maximize-overlay";
        const inner = document.createElement("div");
        inner.className = "maximize-inner";
        overlay.appendChild(inner);

        const closeBtn = document.createElement("button");
        closeBtn.type = "button";
        closeBtn.className = "chart-maximize-close";
        closeBtn.innerHTML = "&times; <span>Close</span>";
        overlay.appendChild(closeBtn);

        const titleEl = document.createElement("div");
        titleEl.className = "chart-maximize-title";
        overlay.appendChild(titleEl);

        document.body.appendChild(overlay);

        let homeParent = null;
        let homeNext = null;
        let activeContent = null;
        let activeBtn = null;

        function fit() {
            if (!activeContent) return;
            activeContent.style.transform = "translate(-50%, -50%)";
            const availW = window.innerWidth - BUFFER * 2;
            const availH = window.innerHeight - BUFFER * 2;
            const w = activeContent.scrollWidth;
            const h = activeContent.scrollHeight;
            if (!w || !h) return;
            const scale = Math.min(availW / w, availH / h, 1);
            activeContent.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        function openFor(content, btn, title) {
            if (activeContent) closeOverlay();
            homeParent = content.parentNode;
            homeNext = content.nextSibling;
            inner.appendChild(content);
            overlay.classList.add("is-open");
            titleEl.innerHTML = title || "";
            document.documentElement.style.overflow = "hidden";
            document.body.style.overflow = "hidden";
            activeContent = content;
            activeBtn = btn;
            if (btn) btn.querySelector("span").textContent = "Exit fullscreen";
            requestAnimationFrame(() => requestAnimationFrame(fit));
        }

        function closeOverlay() {
            if (!activeContent) return;
            activeContent.style.transform = "";
            homeParent.insertBefore(activeContent, homeNext);
            overlay.classList.remove("is-open");
            titleEl.innerHTML = "";
            document.documentElement.style.overflow = "";
            document.body.style.overflow = "";
            if (activeBtn) activeBtn.querySelector("span").textContent = "Fullscreen";
            activeContent = null;
            activeBtn = null;
        }

        closeBtn.addEventListener("click", closeOverlay);
        overlay.addEventListener("click", (e) => { if (e.target === overlay) closeOverlay(); });
        document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeOverlay(); });
        window.addEventListener("resize", fit);

        document.querySelectorAll(".chart-panel").forEach(panel => {
            const content = panel.querySelector(":scope > div[id]");
            if (!content) return;

            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "fullscreen-btn";
            btn.innerHTML = expandIcon + "<span>Fullscreen</span>";

            // Reuse the page's own numbered section heading ("01", "Smoothed
            // Race Pace") as the maximized view's title, so it always stays
            // in sync with what's on the page.
            const sectionLabel = panel.previousElementSibling;
            let title = "";
            if (sectionLabel && sectionLabel.classList.contains("section-label")) {
                const idx = sectionLabel.querySelector(".idx");
                const h2 = sectionLabel.querySelector("h2");
                title = (idx ? `<span class="idx">${idx.textContent}</span>` : "") + (h2 ? h2.textContent : "");
            }

            btn.addEventListener("click", () => {
                if (activeContent === content) closeOverlay();
                else openFor(content, btn, title);
            });

            panel.insertBefore(btn, panel.firstChild);
        });
    })();

</script>
