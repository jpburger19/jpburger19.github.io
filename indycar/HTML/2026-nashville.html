<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INDYCAR Data Analysis</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px 0 60px;
            font-family: sans-serif;
        }
        .line {
            fill: none;
            stroke-width: 3;
        }
        .dot {
            stroke: #fff;
            stroke-width: 1.5;
            cursor: pointer;
        }
        .dot:hover {
            r: 7;
        }
        .axis-label {
            font-family: sans-serif;
            font-size: 12px;
            fill: #000000;
        }
        .grid line {
            stroke: #e5e7eb;
            stroke-opacity: 0.7;
            shape-rendering: crispEdges;
        }
        .grid path {
            stroke-width: 0;
        }
        .legend-text {
            font-family: sans-serif;
            font-size: 12px;
            fill: #374151;
        }
        .legend-row {
            cursor: pointer;
        }
        .legend-btn-bg {
            fill: #ffffff;
            stroke: #d1d5db;
            stroke-width: 1;
        }
        .legend-row:hover .legend-btn-bg {
            fill: #f3f4f6;
            stroke: #9ca3af;
        }
        .legend-row.hidden .legend-btn-bg {
            fill: #f9fafb;
        }
        .legend-row.hidden .legend-text {
            fill: #9ca3af;
            text-decoration: line-through;
        }
        .legend-row.hidden .legend-swatch {
            stroke-opacity: 0.25;
        }
        .legend-row:hover .legend-swatch {
            stroke-width: 5;
        }
        .legend-color-input {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            border: none;
            cursor: pointer;
            background: none;
        }
    </style>
</head>
<body>
<h2>2026 Borchetta Bourbon Music City Grand Prix</h2>
<h2>No data yet - Race on 7/19</h2>
</body>
</html>
